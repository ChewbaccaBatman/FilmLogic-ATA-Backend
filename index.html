<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film Logic — ATA Carnet Billing Tool</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,-apple-system,sans-serif;background:#0f0f0f;color:#f0ede8;min-height:100vh}
.wrap{max-width:800px;margin:0 auto;padding:0 20px 60px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:24px}
.hdr img{height:68px}
.hdr-info{text-align:right;font-size:11px;color:#9e9b95;line-height:1.8}
.hdr-info a{color:#9e9b95;text-decoration:none}
.hdr-info a:hover{color:#d4a843}
.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,.07)}
.tab-btn{background:none;border:none;color:#9e9b95;font-size:14px;font-family:inherit;padding:10px 20px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
.tab-btn.active{color:#d4a843;border-bottom-color:#d4a843}
.tab-btn:hover:not(.active){color:#f0ede8}
.sub-tabs{display:flex;gap:6px;margin-bottom:20px}
.sub-btn{background:#181818;border:1px solid rgba(255,255,255,.07);border-radius:6px;color:#9e9b95;font-size:13px;font-family:inherit;padding:8px 16px;cursor:pointer;transition:all .15s}
.sub-btn.active{background:#d4a843;color:#0f0f0f;border-color:#d4a843;font-weight:600}
.sub-btn:hover:not(.active){color:#f0ede8;border-color:rgba(255,255,255,.15)}
.card{background:#181818;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:20px;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#9e9b95}
.fg input,.fg select,.fg textarea{background:#222;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#f0ede8;font-family:inherit;font-size:14px;padding:10px 12px;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#d4a843}
.fg textarea{resize:vertical;min-height:80px}
.fg select option{background:#222}
.hint{font-size:11px;color:#9e9b95;margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:10px 18px;transition:all .15s}
.btn-gold{background:#d4a843;color:#0f0f0f}
.btn-gold:hover{background:#e0b84e}
.btn-ghost{background:rgba(255,255,255,.06);color:#f0ede8}
.btn-ghost:hover{background:rgba(255,255,255,.11)}
.btn-danger{background:rgba(224,85,85,.12);color:#e05555}
.btn-danger:hover{background:rgba(224,85,85,.22)}
.btn-blue{background:rgba(74,159,212,.12);color:#4a9fd4}
.btn-blue:hover{background:rgba(74,159,212,.22)}
.btn-sm{font-size:12px;padding:6px 12px}
.sbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px}
.sbadge.on{background:rgba(77,184,122,.12);color:#4db87a}
.sbadge.off{background:rgba(224,85,85,.12);color:#e05555}
.sdot{width:6px;height:6px;border-radius:50%;background:currentColor}
.steps{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.step{display:flex;align-items:center;gap:6px;font-size:12px;color:#9e9b95}
.step-n{width:22px;height:22px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.step.active{color:#d4a843}
.step.done{color:#4db87a}
.step.done .step-n{background:#4db87a;border-color:#4db87a;color:#0f0f0f}
.step-line{flex:1;height:1px;background:rgba(255,255,255,.1)}
.bil-hdr{display:flex;align-items:center;padding:6px 0 8px;border-bottom:1px solid rgba(255,255,255,.08);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#9e9b95}
.bil-drag{width:28px;flex-shrink:0}
.bil-row{display:flex;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.bil-row.dragging{opacity:.35}
.bil-row.drag-over{border-top:2px solid #d4a843}
.drag-handle{width:28px;color:rgba(255,255,255,.18);cursor:grab;user-select:none;font-size:14px;flex-shrink:0}
.drag-handle:hover{color:#9e9b95}
.bil-lbl{flex:1;background:none;border:none;color:#f0ede8;font-family:inherit;font-size:13px;padding:5px 6px;border-radius:4px;outline:none}
.bil-lbl:hover,.bil-lbl:focus{background:rgba(255,255,255,.05)}
.bil-amt{width:100px;background:none;border:none;color:#f0ede8;font-family:inherit;font-size:13px;text-align:right;padding:5px 6px;border-radius:4px;outline:none}
.bil-amt:hover,.bil-amt:focus{background:rgba(255,255,255,.05)}
.bil-del{width:28px;background:none;border:none;color:rgba(255,255,255,.18);cursor:pointer;font-size:15px;border-radius:4px;flex-shrink:0;line-height:1;padding:4px}
.bil-del:hover{color:#e05555;background:rgba(224,85,85,.1)}
.bil-total{display:flex;align-items:center;justify-content:space-between;padding:14px 0 0;margin-top:6px;border-top:1px solid rgba(255,255,255,.1)}
.bil-total-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#9e9b95}
.bil-total-amt{font-size:20px;font-weight:700;color:#d4a843}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-card{background:#111;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:7px}
.opt-title{font-size:13px;font-weight:600}
.opt-price{font-size:12px;color:#d4a843}
.opt-desc{font-size:11px;color:#9e9b95;flex:1}
.btn-add{background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.3);color:#d4a843;border-radius:5px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;padding:6px 12px;align-self:flex-start;transition:all .15s}
.btn-add:hover{background:rgba(212,168,67,.2)}
.btn-add.added{background:rgba(77,184,122,.1);border-color:rgba(77,184,122,.3);color:#4db87a}
.custom-add{display:flex;gap:8px;align-items:center;margin-top:10px}
.custom-add input{background:#222;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#f0ede8;font-family:inherit;font-size:13px;padding:8px 10px;outline:none}
.custom-add input:focus{border-color:#d4a843}
.custom-add .ci-desc{flex:1}
.custom-add .ci-amt{width:90px}
.disclosures{border-left:3px solid #d4a843;padding:12px 16px;background:rgba(212,168,67,.05);border-radius:0 6px 6px 0;margin-bottom:16px}
.disclosures p{font-size:12px;color:#9e9b95;margin-bottom:5px;line-height:1.5}
.disclosures p:last-child{margin-bottom:0}
.disclosures strong{color:#f0ede8}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px}
.info-grid .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#9e9b95;display:block;margin-bottom:2px}
.hist-item{background:#181818;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:16px;margin-bottom:10px;position:relative}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.hist-name{font-size:14px;font-weight:600}
.hist-total{font-size:16px;font-weight:700;color:#d4a843}
.hist-meta{font-size:11px;color:#9e9b95;margin-bottom:10px;line-height:1.7}
.hist-btns{display:flex;gap:8px}
.hist-del{position:absolute;top:12px;right:12px;background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;font-size:17px;line-height:1;padding:2px}
.hist-del:hover{color:#e05555}
.search-bar{background:#222;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#f0ede8;font-family:inherit;font-size:14px;padding:10px 14px;outline:none;width:100%}
.search-bar:focus{border-color:#d4a843}
.empty{text-align:center;color:#9e9b95;padding:50px 20px}
.empty .ei{font-size:32px;margin-bottom:10px}
.slbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#9e9b95;margin-bottom:12px;font-weight:600}
.errmsg{background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.25);border-radius:6px;padding:12px 16px;color:#e05555;font-size:13px;margin-top:12px}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.2);border-top-color:#f0ede8;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:rgba(255,255,255,.07);margin:16px 0}
.email-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
@media(max-width:580px){.form-grid,.opt-grid,.info-grid{grid-template-columns:1fr}.hdr{flex-direction:column;gap:10px;align-items:flex-start}.hdr-info{text-align:left}}
</style>
</head>

let EL=[], FORM={}, quoteSub="email", manualStep=1;
let serverOnline=null, statusInterval=null;
let fromHistory=false, editSnap=null;

// ── Fee tables ──────────────────────────────────────────────────────────────
function councilFee(v){return v<10000?305:v<50000?350:v<150000?415:v<400000?475:v<1000000?530:595}
function issuanceFee(v){return v<10000?150:v<50000?200:v<150000?250:v<400000?300:v<1000000?350:400}
function bondFee(v,t){
  const m=t==="vehicle_corp"?1.00:t==="vehicle_ind"?1.50:0.40;
  return Math.max(v*m*0.015,125);
}
function insFee(v,c){
  if(c<=0)return 0;
  const r=c<=3?0.0096:c<=7?0.0126:c<=11?0.0186:0.0216;
  return Math.max(v*r,125);
}

function buildSysLines(f){
  const v=parseFloat(f.value)||0;
  const lines=[
    {id:"ctpat",   label:"CTPAT Fees (Customs Trade Partnership Against Terrorism)",amount:25},
    {id:"council", label:"US Council Charges",                                       amount:councilFee(v)},
    {id:"bond",    label:"Carnet Bond Fee",                                          amount:bondFee(v,f.vehicleType||"general")},
    {id:"issuance",label:"Carnet Issuance",                                          amount:issuanceFee(v)},
    {id:"closing", label:"ATA Carnet Closing Fees",                                  amount:75},
    {id:"fedex",   label:"Standard FedEx Overnight (Pending Delivery Address)",      amount:0,isFedex:true},
  ];
  const c=parseInt(f.countries)||0;
  if(c>0) lines.push({id:"insurance",label:"Cargo Insurance",amount:insFee(v,c)});
  return lines;
}

function smartMerge(sysLines,snap){
  const byId={};
  sysLines.forEach(l=>byId[l.id]=l);
  const snapIds=new Set(snap.map(l=>l.id));
  const out=[];
  snap.forEach(s=>{
    if(s.id.startsWith("custom_")){out.push({...s})}
    else if(byId[s.id]){out.push({...s,amount:byId[s.id].amount,isFedex:byId[s.id].isFedex})}
  });
  sysLines.forEach(sl=>{if(!snapIds.has(sl.id))out.push({...sl})});
  return out;
}

// ── Formatting ──────────────────────────────────────────────────────────────
function fmt(n){return"$"+parseFloat(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",")}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
function calcTotal(){return EL.reduce((s,l)=>s+(parseFloat(l.amount)||0),0)}

// ── Billing render ──────────────────────────────────────────────────────────
function flushInputs(){
  document.querySelectorAll(".bil-lbl").forEach(i=>{const n=+i.dataset.i;if(EL[n])EL[n].label=i.value});
  document.querySelectorAll(".bil-amt").forEach(i=>{const n=+i.dataset.i;if(EL[n])EL[n].amount=parseFloat(i.value)||0});
}

function renderBilling(con){
  const hasFx=EL.some(l=>l.isFedex&&parseFloat(l.amount)>0);
  const rows=EL.map((l,i)=>{
    const amtEl=(l.isFedex||l.isTbd)
      ?`<input class="bil-amt" data-i="${i}" placeholder="TBD" value="${l.amount>0?parseFloat(l.amount).toFixed(2):""}">`
      :`<input class="bil-amt" data-i="${i}" value="${parseFloat(l.amount||0).toFixed(2)}">`;
    return`<div class="bil-row" draggable="true" data-i="${i}">
      <span class="drag-handle" title="Drag to reorder">&#8999;</span>
      <input class="bil-lbl" data-i="${i}" value="${esc(l.label)}">
      ${amtEl}
      <button class="bil-del" onclick="deleteLine(${i})">&#215;</button>
    </div>`;
  }).join("");
  con.innerHTML=`
    <div class="bil-hdr"><span class="bil-drag"></span><span style="flex:1">Description</span><span style="width:100px;text-align:right">Amount</span><span style="width:28px"></span></div>
    ${rows}
    <div class="bil-total">
      <span class="bil-total-lbl">${hasFx?"Estimated Total":"Estimated Total (FedEx Pending)"}</span>
      <span class="bil-total-amt" id="grand-total">${fmt(calcTotal())}</span>
    </div>
    <div class="divider"></div>
    <div class="slbl">Add Custom Line</div>
    <div class="custom-add">
      <input class="ci-desc" id="ci-desc" placeholder="Description" type="text">
      <input class="ci-amt" id="ci-amt" placeholder="0.00" type="number" step="0.01" min="0">
      <button class="btn btn-ghost btn-sm" onclick="addCustomLine()">+ Add</button>
    </div>`;

  con.querySelectorAll(".bil-row").forEach(row=>{
    row.addEventListener("dragstart",e=>{dragSrc=+row.dataset.i;row.classList.add("dragging");e.dataTransfer.effectAllowed="move"});
    row.addEventListener("dragend",()=>{row.classList.remove("dragging");con.querySelectorAll(".bil-row").forEach(r=>r.classList.remove("drag-over"))});
    row.addEventListener("dragover",e=>{e.preventDefault();con.querySelectorAll(".bil-row").forEach(r=>r.classList.remove("drag-over"));row.classList.add("drag-over")});
    row.addEventListener("drop",e=>{
      e.preventDefault();const dst=+row.dataset.i;
      if(dragSrc!==null&&dragSrc!==dst){flushInputs();const[m]=EL.splice(dragSrc,1);EL.splice(dst,0,m);renderBillingSection()}
    });
  });

  con.querySelectorAll(".bil-lbl,.bil-amt").forEach(inp=>{
    inp.addEventListener("input",()=>{
      const i=+inp.dataset.i;
      if(inp.classList.contains("bil-amt")){EL[i].amount=parseFloat(inp.value)||0}
      else{EL[i].label=inp.value}
      const gt=document.getElementById("grand-total");
      const hasFx2=EL.some(l=>l.isFedex&&parseFloat(l.amount)>0);
      if(gt){gt.textContent=fmt(calcTotal())}
      const lbl=con.querySelector(".bil-total-lbl");
      if(lbl)lbl.textContent=hasFx2?"Estimated Total":"Estimated Total (FedEx Pending)";
    });
  });
}

function renderBillingSection(){

async function genFromEmail(){

  <div class="ib">
    <div class="c"><label>Client</label><span>${escP(f.client||"—")}</span></div>
    <div class="c"><label>Production</label><span>${escP(f.production||"—")}</span></div>
    <div class="c"><label>Carnet #</label><span>${escP(f.carnetNumber||"—")}</span></div>
    <div class="c"><label>Type</label><span>${escP(f.direction||"—")}</span></div>
    <div class="c"><label>Declared Value</label><span>$${v.toLocaleString("en-US",{minimumFractionDigits:2})} USD</span></div>
    <div class="c"><label>Commodity</label><span>${escP(f.commodity||"—")}</span></div>
    ${f.notes?`<div class="c full"><label>Notes</label><span>${escP(f.notes)}</span></div>`:""}
  </div>
  <table>
    <thead><tr><th>Description</th><th style="text-align:right">Amount</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr class="tr-total"><td>${hasFx?"Estimated Total":"Estimated Total (FedEx Pending)"}</td><td>${fmt(total)}</td></tr></tfoot>
  </table>
  <div class="disc">
    <p>&#8226; In order to avoid expediting fees, the carnet must be submitted <strong>3 days in advance.</strong></p>
    <p>&#8226; All carnets must have individual values, detailed descriptions, serial numbers, country of origins and quantities.</p>
    <p>&#8226; Failure to provide all details may jeopardize the acceptance of the carnet by the foreign country.</p>
  </div>
  <div class="ft">This estimate is valid for 7 days and is subject to change.</div>
</div></body></html>`);
  win.document.close();
}

// ── Copy quote ───────────────────────────────────────────────────────────────
function doCopyQuote(){
  flushInputs();if(!fromHistory)saveHist();
  const f=FORM,total=calcTotal();
  const hasFx=EL.some(l=>l.isFedex&&parseFloat(l.amount)>0);
  const lines=EL.map(l=>{
    if(l.isFedex){const a=parseFloat(l.amount)||0;return l.label+"    "+(a>0?fmt(a):"TBD – Pending Delivery Address")}if(l.isTbd){const a=parseFloat(l.amount)||0;return l.label+"    "+(a>0?fmt(a):"TBD")}
    return l.label+"    "+fmt(parseFloat(l.amount)||0);
  }).join("\n");
  const v=parseFloat(f.value||0);
  const txt=`* * * ATA CARNET ${(f.direction||"").toUpperCase()} * * *
Carnet #: ${f.carnetNumber||"—"}
Client: ${f.client||"—"}
Production: ${f.production||"—"}
Commodity: ${f.commodity||"—"}
Declared Value: $${v.toLocaleString("en-US",{minimumFractionDigits:2})} USD

${lines}

${hasFx?"ESTIMATED TOTAL":"ESTIMATED TOTAL (FedEx Pending)"}    ${fmt(total)}

ATA Carnet Cargo Disclosures:
• Carnet must be submitted 3 days in advance to avoid expediting fees.
• All carnets must have individual values, detailed descriptions, serial numbers, country of origins and quantities.
• Failure to provide all details may jeopardize the acceptance of the carnet by the foreign country.

This estimate is valid for 7 days and is subject to change.`;
  navigator.clipboard.writeText(txt).then(()=>toast("Quote copied to clipboard!")).catch(()=>prompt("Copy this:",txt));
}

// ── Toast ────────────────────────────────────────────────────────────────────
function toast(msg){
  let t=document.getElementById("_toast");
  if(!t){t=document.createElement("div");t.id="_toast";t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#4db87a;color:#fff;padding:10px 22px;border-radius:6px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .3s;pointer-events:none";document.body.appendChild(t)}
  t.textContent=msg;t.style.opacity="1";
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity="0",2500);
}

// ── History ──────────────────────────────────────────────────────────────────
const LS="fl_ata_v3";
function loadH(){try{return JSON.parse(localStorage.getItem(LS)||"[]")}catch{return[]}}
function saveHist(){
  const h=loadH(),total=calcTotal();
  h.unshift({id:Date.now()+"_"+Math.random().toString(36).slice(2),ts:new Date().toISOString(),client:FORM.client||"",production:FORM.production||"",carnetNumber:FORM.carnetNumber||"",direction:FORM.direction||"",commodity:FORM.commodity||"",total,form:{...FORM},lines:EL.map(l=>({...l}))});
  if(h.length>100)h.splice(100);
  localStorage.setItem(LS,JSON.stringify(h));
}

function renderHistory(){
  const h=loadH();
  document.getElementById("tab-history").innerHTML=`
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px">
      <input class="search-bar" id="hsearch" placeholder="Search by client, carnet #, or production..." oninput="filterH()" style="flex:1">
      ${h.length?`<button class="btn btn-danger btn-sm" onclick="clearH()">Clear all</button>`:""}
    </div>
    <div id="hlist"></div>`;
  renderHList(h);
}

function filterH(){
  const q=(document.getElementById("hsearch")?.value||"").toLowerCase();
  const h=loadH().filter(e=>!q||e.client.toLowerCase().includes(q)||e.carnetNumber.toLowerCase().includes(q)||e.production.toLowerCase().includes(q));
  renderHList(h);
}

function renderHList(h){
  const el=document.getElementById("hlist");if(!el)return;
  if(!h.length){el.innerHTML=`<div class="empty"><div class="ei">&#128203;</div><div>No quotes yet.</div><div style="font-size:12px;margin-top:6px">Quotes are saved when you export PDF or copy a quote.</div></div>`;return}
  el.innerHTML=h.map(e=>{
    const d=new Date(e.ts);
    const ds=d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})+" "+d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
    return`<div class="hist-item">
      <div class="hist-top">
        <div class="hist-name">${esc(e.client||"—")} — ${esc(e.production||"—")}</div>
        <div class="hist-total">${fmt(e.total)}</div>
      </div>
      <div class="hist-meta">Carnet #${esc(e.carnetNumber||"—")} &middot; ${esc(e.direction||"—")} &middot; ${esc(e.commodity||"—")}<br>${ds}</div>
      <div class="hist-btns">
        <button class="btn btn-blue btn-sm" onclick="viewHistPDF('${esc(e.id)}')">&#11041; View PDF</button>
        <button class="btn btn-ghost btn-sm" onclick="editHist('${esc(e.id)}')">&#9998; Edit &amp; create new</button>
      </div>
      <button class="hist-del" onclick="delHist('${esc(e.id)}')">&#215;</button>
    </div>`;
  }).join("");
}

function viewHistPDF(id){const e=loadH().find(h=>h.id===id);if(!e)return;FORM={...e.form};EL=e.lines.map(l=>({...l}));fromHistory=true;exportPDF()}
function editHist(id){const e=loadH().find(h=>h.id===id);if(!e)return;FORM={...e.form};EL=e.lines.map(l=>({...l}));fromHistory=false;showTab("quote");renderQuoteResult(false)}
function delHist(id){const h=loadH().filter(x=>x.id!==id);localStorage.setItem(LS,JSON.stringify(h));renderHistory()}
function clearH(){if(!confirm("Delete all quote history? This cannot be undone."))return;localStorage.removeItem(LS);renderHistory()}

// ── Utils ────────────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
function escP(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

// ── Init ─────────────────────────────────────────────────────────────────────
renderQuoteTab();
</script>
</body>
</html>
