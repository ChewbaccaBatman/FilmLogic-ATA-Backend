<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATA Carnet Billing — Film Logic</title>
<style>
:root{
  --bg:#0f0f0f;--bg2:#181818;--bg3:#222;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.2);
  --text:#f0ede8;--text2:#9e9b95;--text3:#5c5a56;
  --gold:#d4a843;--gold-bg:rgba(212,168,67,0.1);--gold-border:rgba(212,168,67,0.35);
  --green:#4db87a;--green-bg:#0d2418;--green-border:rgba(77,184,122,0.25);
  --red:#e05555;--red-bg:#2a0d0d;--red-border:rgba(224,85,85,0.2);
  --blue:#4a9fd4;--blue-bg:#0d1f2e;--blue-border:rgba(74,159,212,0.25);
  --r:8px;--rlg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
.app{max-width:800px;margin:0 auto;padding:0 20px 80px}

/* Header */
.hdr{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rlg);padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.hdr-logo{height:68px;width:auto;object-fit:contain;flex-shrink:0}
.hdr-right{text-align:right;font-size:11px;color:var(--text3);line-height:1.9}
.hdr-right a{color:var(--gold);text-decoration:none}

/* Tabs */
.tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:0}
.tab{padding:10px 20px;font-size:13px;font-weight:500;background:none;border:none;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;transition:color 0.15s;margin-bottom:-0.5px}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover:not(.active){color:var(--text2)}
.tab-content{padding-top:20px}

/* Sub-tabs */
.sub-tabs{display:flex;gap:8px;margin-bottom:18px}
.stab{padding:7px 16px;font-size:12px;font-weight:500;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;transition:all 0.15s}
.stab.active{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold)}
.stab:hover:not(.active){color:var(--text2);border-color:var(--border3)}

/* Cards */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rlg);padding:20px;margin-bottom:12px}
.card-sm{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:10px}
.sec-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;padding-bottom:8px;border-bottom:.5px solid var(--border)}

/* Alerts */
.alert-success{background:var(--green-bg);color:var(--green);border:.5px solid var(--green-border);padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:12px}
.alert-info{background:var(--blue-bg);color:var(--blue);border:.5px solid var(--blue-border);padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:12px}
.alert-error{background:var(--red-bg);color:var(--red);border:.5px solid var(--red-border);padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:10px}
.info-box{background:var(--bg3);border:.5px solid var(--border);border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--text3);line-height:1.7;margin-bottom:12px}
.info-box strong{color:var(--text2);display:block;margin-bottom:3px}

/* Form */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label,.flabel{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.field input,.field select,.field textarea{background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--r);padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.field input::placeholder,.field textarea::placeholder{color:var(--text3)}
.field select option{background:var(--bg3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.divider{height:.5px;background:var(--border);margin:16px 0}

/* Buttons */
.btn{padding:8px 18px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--text2);font-family:inherit;transition:all .15s}
.btn:hover{color:var(--text);border-color:var(--border3)}
.btn-gold{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold)}
.btn-gold:hover{background:rgba(212,168,67,.18)}
.btn-green{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.btn-green:hover{background:rgba(77,184,122,.12)}
.btn-red{background:var(--red-bg);border-color:var(--red-border);color:var(--red);padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.brow{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.brow-split{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:16px;flex-wrap:wrap}

/* Status badge */
.sbadge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;margin-bottom:14px}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.s-online{background:var(--green-bg);color:var(--green)}.s-online .sdot{background:var(--green)}
.s-offline{background:var(--red-bg);color:var(--red)}.s-offline .sdot{background:var(--red)}
.s-checking{background:var(--bg3);color:var(--text3)}.s-checking .sdot{background:var(--text3)}

/* Metrics */
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.metric{background:var(--bg3);border-radius:var(--r);padding:12px 14px}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.metric-value{font-size:16px;font-weight:600;color:var(--text)}

/* ── Billing table ── */
.btbl-hdr{display:grid;grid-template-columns:28px 1fr 130px 32px;gap:8px;padding:4px 0 8px;border-bottom:.5px solid var(--border);margin-bottom:2px}
.btbl-hdr span{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.brow-item{display:grid;grid-template-columns:28px 1fr 130px 32px;gap:8px;align-items:center;padding:4px 0;border-bottom:.5px solid var(--border)}
.brow-item[draggable=true]{cursor:grab}
.brow-item[draggable=true]:active{cursor:grabbing;opacity:.5}
.brow-item.drag-over{border-top:2px solid var(--gold)}
.drag-handle{color:var(--text3);font-size:15px;cursor:grab;display:flex;align-items:center;justify-content:center;padding:4px;border-radius:4px;user-select:none}
.drag-handle:hover{color:var(--text2)}
.bil-lbl{background:transparent;border:.5px solid transparent;border-radius:var(--r);padding:5px 6px;color:var(--text2);font-size:13px;font-family:inherit;outline:none;width:100%;transition:all .15s}
.bil-lbl:hover{border-color:var(--border2)}
.bil-lbl:focus{border-color:var(--gold);background:var(--bg3);color:var(--text)}
.bil-amt{background:transparent;border:.5px solid transparent;border-radius:var(--r);padding:5px 8px;color:var(--text);font-size:13px;font-weight:600;font-family:inherit;outline:none;text-align:right;width:100%;transition:all .15s}
.bil-amt:hover{border-color:var(--border2)}
.bil-amt:focus{border-color:var(--gold);background:var(--bg3)}
.bil-free{font-size:11px;background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:20px;font-weight:600;text-align:center;white-space:nowrap}
.bil-tbd{font-size:12px;color:var(--text3);text-align:right;font-style:italic;padding:5px 8px}
.btn-del{width:28px;height:28px;background:transparent;border:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;border-radius:4px;transition:all .15s}
.btn-del:hover{color:var(--red);background:var(--red-bg)}
.bil-total{display:flex;justify-content:space-between;padding:12px 0 0;margin-top:8px;border-top:1px solid rgba(255,255,255,.12)}
.bil-total-lbl{font-size:13px;font-weight:600;color:var(--text)}
.bil-total-amt{font-size:18px;font-weight:700;color:var(--gold)}
.slbl-row{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.edit-hint{font-size:11px;color:var(--text3);font-style:italic;font-weight:400;text-transform:none;letter-spacing:0}

/* ── Optional fees panel ── */
.opt-panel{background:var(--bg3);border:.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.opt-panel-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r);padding:8px 10px;gap:8px;transition:border-color .15s}
.opt-item:hover{border-color:var(--border2)}
.opt-item-left{display:flex;flex-direction:column;gap:2px}
.opt-item-name{font-size:12px;color:var(--text2);font-weight:500}
.opt-item-price{font-size:11px;color:var(--text3)}
.btn-add-opt{padding:4px 10px;font-size:11px;font-weight:600;border-radius:20px;border:.5px solid var(--gold-border);background:var(--gold-bg);color:var(--gold);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-add-opt:hover{background:rgba(212,168,67,.2)}
.btn-add-opt.added{border-color:var(--green-border);background:var(--green-bg);color:var(--green)}

/* ── Steps ── */
.stepbar{display:flex;align-items:center;margin-bottom:20px}
.step-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.sdot2{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:.5px solid var(--border2);background:var(--bg3);color:var(--text3)}
.sdot2.active{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold)}
.sdot2.done{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.step-lbl{font-size:11px;color:var(--text3);white-space:nowrap}
.step-lbl.active{color:var(--text2)}
.step-line{flex:1;height:.5px;background:var(--border);align-self:center;margin-bottom:16px}

/* ── History ── */
.hist-search{display:flex;gap:8px;margin-bottom:14px}
.hist-item{background:var(--bg3);border:.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.hist-item-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px}
.hist-client{font-size:13px;font-weight:500;color:var(--text)}
.hist-amt{font-size:14px;font-weight:600;color:var(--gold)}
.hist-meta{font-size:11px;color:var(--text3);margin-bottom:8px}
.hist-actions{display:flex;gap:8px}
.hist-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(212,168,67,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}

/* Textarea */
textarea.email-area{width:100%;min-height:160px;resize:vertical;background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--r);padding:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;line-height:1.6}
textarea.email-area:focus{border-color:var(--gold)}

/* Disclosure box */
.disclosure{background:var(--bg3);border:.5px solid var(--border);border-left:3px solid var(--gold);border-radius:0 var(--r) var(--r) 0;padding:12px 14px;font-size:12px;color:var(--text3);line-height:1.8;margin-bottom:12px}
.disclosure strong{color:var(--text2);display:block;margin-bottom:6px}

@media(max-width:600px){
  .g2,.g3{grid-template-columns:1fr}
  .metrics{grid-template-columns:1fr 1fr}
  .hdr{flex-direction:column;align-items:flex-start}
  .hdr-right{text-align:left}
  .brow-split{flex-direction:column;align-items:stretch}
  .btbl-hdr,.brow-item{grid-template-columns:24px 1fr 100px 28px}
  .opt-grid{grid-template-columns:1fr}
  .hist-search{flex-direction:column}
}
</style>
</head>

// ── Fee calculations ──────────────────────────────────────────────────
function fmt(n){return Number(n||0).toLocaleString('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2,maximumFractionDigits:2});}
function pd(s){return parseFloat(String(s||0).replace(/[$,]/g,''))||0;}

function councilFee(v){
  if(v<10000)return 305;if(v<50000)return 350;if(v<150000)return 415;
  if(v<400000)return 475;if(v<1000000)return 530;return 595;
}
function bondFee(v,vt){
  const m=vt==='corp'?1.0:vt==='individual'?1.5:0.40;
  return Math.max(Math.round(v*m*0.015*100)/100,125);
}
function issuanceFee(v){
  if(v<10000)return 150;if(v<50000)return 200;if(v<150000)return 250;
  if(v<400000)return 300;if(v<1000000)return 350;return 400;
}
function insuranceFee(v,n){
  if(!n||n<=0)return 0;
  const r=n<=3?0.0096:n<=7?0.0126:n<=11?0.0186:0.0216;
  return Math.max(Math.round(v*r*100)/100,125);
}

// ── Build base quote lines ────────────────────────────────────────────
function buildQuoteLines(f){
  const val=pd(f.value);
  const vt=f.vehicleType||'';
  const lines=[];

  lines.push({id:'ctpat',l:'CTPAT Fees (Customs Trade Partnership Against Terrorism)',a:25.00,fixed:true});
  lines.push({id:'council',l:'US Council Charges',a:councilFee(val),fixed:true});
  lines.push({id:'bond',l:`Carnet Bond Fee (${vt==='corp'?'Vehicle – Corporation':vt==='individual'?'Vehicle – Individual':'General Commodity'})`,a:bondFee(val,vt),fixed:true});
  lines.push({id:'issuance',l:'Carnet Issuance',a:issuanceFee(val),fixed:true});
  lines.push({id:'closing',l:'ATA Carnet Closing Fees',a:75.00,fixed:true});
  lines.push({id:'fedex',l:'Standard FedEx Overnight (Pending Delivery Address)',a:0,tbd:true,fixed:true});

  // Cargo insurance if set
  if(f.insuranceCountries&&parseInt(f.insuranceCountries)>0){
    const ins=insuranceFee(val,parseInt(f.insuranceCountries));
    lines.push({id:'insurance',l:`ATA Carnet Cargo Insurance (${f.insuranceCountries} countries)`,a:ins,fixed:false});
  }

  return lines;
}

// ── Editable billing state ────────────────────────────────────────────
let EL=[];   // current editable lines
let formSnapshot=null; // snapshot of form when quote was generated
let userEdited=false;

function initEL(lines){
  EL=lines.map(x=>({...x}));
  userEdited=false;
}

function elTotal(){
  return EL.reduce((s,x)=>s+(x.tbd?0:pd(x.a)),0);
}

function markEdited(){userEdited=true;}

function updLbl(i,v){if(EL[i])EL[i].l=v;markEdited();}
function updAmt(i,v){if(EL[i]){EL[i].a=pd(v);delete EL[i].tbd;}markEdited();refreshTotal();}
function delLine(i){EL.splice(i,1);markEdited();refreshTotal();rerenderBT();}
function addCustomLine(){
  const lbl=document.getElementById('nl-lbl')?.value||'';
  const amt=document.getElementById('nl-amt')?.value||'';
  if(!lbl.trim())return;
  EL.push({id:'custom_'+Date.now(),l:lbl,a:pd(amt)||0,fixed:false});
  markEdited();rerenderBT();refreshTotal();
  const li=document.getElementById('nl-lbl');const ai=document.getElementById('nl-amt');
  if(li)li.value='';if(ai)ai.value='';
}

// Smart merge: update system lines with new values, keep manual edits
function smartMerge(newLines){
  const newMap={};
  newLines.forEach(x=>{newMap[x.id]=x;});

  // Update existing system lines
  EL=EL.map(x=>{
    if(x.id&&newMap[x.id]){
      // Update amount but keep user's label if they changed it
      return {...x,a:newMap[x.id].a,tbd:newMap[x.id].tbd};
    }
    return x;
  });

  // Add any new system lines not in EL
  newLines.forEach(x=>{
    if(!EL.find(e=>e.id===x.id)){
      EL.push({...x});
    }
  });

  // Remove system lines no longer applicable (except custom lines)
  EL=EL.filter(x=>{
    if(!x.id||x.id.startsWith('custom_'))return true;
    return !!newMap[x.id];
  });

  refreshTotal();
}

function refreshTotal(){
  const t=elTotal();
  ['bt-total','metric-total'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=fmt(t);});
}

function flushInputs(){
  const wrap=document.getElementById('bt-wrap');
  if(!wrap)return;
  wrap.querySelectorAll('.bil-lbl').forEach((inp,i)=>{if(i<EL.length&&inp.value.trim())EL[i].l=inp.value.trim();});
  wrap.querySelectorAll('.bil-amt').forEach((inp,i)=>{if(i<EL.length){const v=pd(inp.value);EL[i].a=v;delete EL[i].tbd;}});
}

function rerenderBT(){
  const w=document.getElementById('bt-wrap');
  if(w)w.innerHTML=btHTML();
}

// Drag reorder
let dragIdx=null;
function dStart(e,i){dragIdx=i;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.brow-item').forEach(r=>r.classList.remove('drag-over'));}
function dOver(e,i){e.preventDefault();document.querySelectorAll('.brow-item').forEach(r=>r.classList.remove('drag-over'));if(dragIdx!==null&&dragIdx!==i)e.currentTarget.classList.add('drag-over');}
function dDrop(e,i){e.preventDefault();if(dragIdx===null||dragIdx===i)return;const m=EL.splice(dragIdx,1)[0];EL.splice(i,0,m);dragIdx=null;markEdited();rerenderBT();refreshTotal();}

function btHTML(){
  const rows=EL.map((x,i)=>`
    <div class="brow-item" draggable="true" ondragstart="dStart(event,${i})" ondragend="dEnd(event)" ondragover="dOver(event,${i})" ondrop="dDrop(event,${i})">
      <div class="drag-handle">⠿</div>
      <input class="bil-lbl" value="${(x.l||'').replace(/"/g,'&quot;')}" oninput="updLbl(${i},this.value)" placeholder="Line item">
      ${x.tbd
        ?`<input class="bil-amt" value="" placeholder="Enter amount" oninput="updAmt(${i},this.value)" style="font-style:italic;color:var(--text3)" onfocus="this.style.color='var(--text)';this.style.fontStyle='normal'">`
        :`<input class="bil-amt" value="${fmt(x.a||0)}" onfocus="this.value='${pd(x.a)||0}'" onblur="this.value=fmt(pd(this.value));updAmt(${i},this.value)" oninput="updAmt(${i},this.value)">`
      }
      <button class="btn-del" onclick="delLine(${i})" title="Remove">×</button>
    </div>`).join('');

  return `
    <div class="btbl-hdr"><span></span><span>Description</span><span style="text-align:right">Amount</span><span></span></div>
    ${rows}
    <div style="border-top:.5px solid var(--border);margin-top:12px;padding-top:12px">
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px">+ Add custom line item</div>
      <div style="display:grid;grid-template-columns:1fr 130px 80px;gap:8px;align-items:center">
        <input id="nl-lbl" style="background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--r);padding:7px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;width:100%" placeholder="Description" onkeydown="if(event.key==='Enter')addCustomLine()">
        <input id="nl-amt" style="background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--r);padding:7px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;width:100%;text-align:right" placeholder="$0.00" type="number" onkeydown="if(event.key==='Enter')addCustomLine()">
        <button class="btn btn-gold" style="padding:7px 10px;font-size:12px" onclick="addCustomLine()">Add</button>
      </div>
    </div>`;
}

// Optional fees definition
const OPT_FEES=[
  {id:'expedite',l:'Expedite Fees',a:250,note:'Required if carnet submitted less than 3 days before departure'},
  {id:'lostdoc',l:'Carnet Lost Document Fee',a:45,note:'If applicable'},
  {id:'addpages',l:'Additional Pages',a:17,note:'$17.00 per page'},
  {id:'addvoucher',l:'Additional Voucher',a:30,note:'$30.00 each'},
];

function isOptAdded(id){return EL.some(x=>x.id===id);}

function addOptFee(id){
  const fee=OPT_FEES.find(f=>f.id===id);
  if(!fee||isOptAdded(id))return;
  EL.push({id:fee.id,l:fee.l,a:fee.a,fixed:false});
  markEdited();rerenderBT();refreshTotal();rerenderOptPanel();
}
function removeOptFee(id){
  EL=EL.filter(x=>x.id!==id);
  markEdited();refreshTotal();rerenderBT();rerenderOptPanel();
}
function rerenderOptPanel(){
  const w=document.getElementById('opt-panel');
  if(w)w.innerHTML=optPanelHTML();
}
function optPanelHTML(){
  return `<div class="opt-panel-title">Optional / If Applicable</div>
  <div class="opt-grid">
    ${OPT_FEES.map(f=>{
      const added=isOptAdded(f.id);
      return `<div class="opt-item">
        <div class="opt-item-left">
          <span class="opt-item-name">${f.l}</span>
          <span class="opt-item-price">${fmt(f.a)} · ${f.note}</span>
        </div>
        ${added
          ?`<button class="btn-add-opt added" onclick="removeOptFee('${f.id}')">✓ Added</button>`
          :`<button class="btn-add-opt" onclick="addOptFee('${f.id}')">+ Add</button>`
        }
      </div>`;
    }).join('')}
  </div>`;
}

// ── Quote view ────────────────────────────────────────────────────────
let currentForm=null;
let currentResult=null;

function quoteView(form,backFn,editFn){
  const meta=[
    form.client&&`<span><span style="color:var(--text3)">Client: </span>${form.client}</span>`,
    form.production&&`<span><span style="color:var(--text3)">Production: </span>${form.production}</span>`,
    form.carnetNumber&&`<span><span style="color:var(--text3)">Carnet #: </span>${form.carnetNumber}</span>`,
    form.commodity&&`<span><span style="color:var(--text3)">Commodity: </span>${form.commodity}</span>`,
    form.direction&&`<span><span style="color:var(--text3)">Type: </span>ATA Carnet ${form.direction}</span>`,
  ].filter(Boolean).join('');

  return `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Estimated total</div><div class="metric-value" id="metric-total">${fmt(elTotal())}</div></div>
      <div class="metric"><div class="metric-label">Declared value</div><div class="metric-value">$${(pd(form.value)||0).toLocaleString()}</div></div>
      <div class="metric"><div class="metric-label">Type</div><div class="metric-value" style="font-size:13px">${form.direction||'—'}</div></div>
    </div>
    ${meta?`<div class="card-sm"><div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px">${meta}</div></div>`:''}
    <div class="card">
      <div class="slbl-row">Billing schedule <span class="edit-hint">Drag ⠿ to reorder · Click to edit · × to remove</span></div>
      <div id="bt-wrap">${btHTML()}</div>
      <div class="bil-total">
        <span class="bil-total-lbl">Estimated total <span style="font-size:11px;font-weight:400;color:var(--text3)">(FedEx pending)</span></span>
        <span class="bil-total-amt" id="bt-total">${fmt(elTotal())}</span>
      </div>
    </div>
    <!-- Optional fees -->
    <div class="opt-panel card" id="opt-panel">${optPanelHTML()}</div>
    <!-- Disclosure -->
    <div class="disclosure">
      <strong>ATA Carnet Cargo Disclosures</strong>
      • In order to avoid expediting fees, the carnet must be submitted <strong>3 days in advance.</strong><br>
      • All carnets must have individual values, detailed descriptions, serial numbers, country of origins and quantities.<br>
      • Failure to provide all details may jeopardize the acceptance of the carnet by the foreign country.
    </div>
    <div class="brow-split">
      <button class="btn" onclick="${backFn}">← New quote</button>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${editFn?`<button class="btn" onclick="${editFn}">Edit details</button>`:''}
        <button class="btn btn-green" onclick="exportPDF(false)">Export PDF</button>
        <button class="btn btn-gold" id="copy-btn" onclick="copyQuote()">Copy quote</button>
      </div>
    </div>`;
}

function copyQuote(){
  flushInputs();
  const form=currentForm;
  if(!form)return;
  saveHistory();
  let t=`* * * ATA CARNET ${form.direction||''} * * *
`;
  if(form.carnetNumber)t+=`Carnet #: ${form.carnetNumber}
`;
  if(form.client)t+=`Client: ${form.client}
`;
  if(form.production)t+=`Production: ${form.production}
`;
  if(form.commodity)t+=`Commodity: ${form.commodity}
`;
  if(form.value)t+=`Declared Value: $${(pd(form.value)||0).toLocaleString()} USD
`;
  t+='
';
  EL.forEach(x=>{t+=`${x.l}	${x.tbd&&!x.a?'TBD – Pending Delivery Address':fmt(x.a)}
`;});
  t+=`
ESTIMATED TOTAL (FedEx Pending)	${fmt(elTotal())}
`;
  t+='
ATA Carnet Cargo Disclosures:
';
  t+='• Carnet must be submitted 3 days in advance to avoid expediting fees.
';
  t+='• All carnets must have individual values, detailed descriptions, serial numbers, country of origins and quantities.
';
  t+='• Failure to provide all details may jeopardize the acceptance of the carnet by the foreign country.
';
  t+='
This estimate is valid for 7 days and is subject to change.';
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.getElementById('copy-btn');
    if(b){b.textContent='Copied!';setTimeout(()=>{b.textContent='Copy quote'},2000);}
  });
}

// ── History ───────────────────────────────────────────────────────────
const HK='fl_ata_v3';
function loadHistory(){try{return JSON.parse(localStorage.getItem(HK))||[];}catch(e){return[];}}
function saveHistory(){
  const h=loadHistory();
  const entry={
    id:Date.now(),
    ts:new Date().toISOString(),
    client:currentForm?.client||'Unknown',
    production:currentForm?.production||'',
    carnetNumber:currentForm?.carnetNumber||'',
    commodity:currentForm?.commodity||'',
    direction:currentForm?.direction||'',
    total:elTotal(),
    form:{...currentForm},
    lines:[...EL],
  };
  h.unshift(entry);
  if(h.length>100)h.splice(100);
  try{localStorage.setItem(HK,JSON.stringify(h));}catch(e){}
}
function delHistItem(id,e){
  e.stopPropagation();
  const h=loadHistory().filter(x=>x.id!==id);
  try{localStorage.setItem(HK,JSON.stringify(h));}catch(e){}
  renderHistory();
}
function clearHistory(){
  if(!confirm('Clear all quote history?'))return;
  try{localStorage.removeItem(HK);}catch(e){}
  renderHistory();
}

function viewHistPDF(item){
  // Restore state and open PDF without saving
  EL=[...item.lines];
  currentForm={...item.form};
  exportPDF(true);
}

function editFromHistory(item){
  // Load the quote into the editor so user can modify and create new quote
  EL=[...item.lines];
  currentForm={...item.form};
  userEdited=true;
  switchTab('quote');
  const c=document.getElementById('tab-quote');
  if(c)c.innerHTML=`<div class="alert-info" style="margin-bottom:12px">&#9998; Editing from history: <strong>${item.client}${item.production?' — '+item.production:''}</strong>. Make your changes then Export PDF or Copy to save as a new quote.</div>`+quoteView(currentForm,'resetQuote()','editDetails()');
}

function renderHistory(){
  const c=document.getElementById('tab-history');
  if(!c)return;
  const q=(document.getElementById('hist-search')?.value||'').toLowerCase();
  const all=loadHistory();
  const filtered=q?all.filter(h=>
    (h.client||'').toLowerCase().includes(q)||
    (h.carnetNumber||'').toLowerCase().includes(q)||
    (h.production||'').toLowerCase().includes(q)
  ):all;

  c.innerHTML=`
    <div class="hist-search">
      <input id="hist-search" style="flex:1;background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--r);padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none" placeholder="&#128269; Search by client, carnet number, or production…" value="${q}" oninput="renderHistory()">
      ${all.length?`<button class="btn btn-red" onclick="clearHistory()">Clear all</button>`:''}
    </div>
    ${!all.length
      ?`<div class="hist-empty">No quotes saved yet.<br><span style="font-size:12px;margin-top:6px;display:block">Quotes are saved automatically when you Export PDF or Copy.</span></div>`
      :!filtered.length
      ?`<div class="hist-empty">No results for "<strong>${q}</strong>"</div>`
      :`<div style="font-size:12px;color:var(--text3);margin-bottom:10px">${filtered.length} quote${filtered.length!==1?'s':''} found</div>`+
      filtered.map(h=>`
        <div class="hist-item">
          <div class="hist-item-top">
            <span class="hist-client">${h.client||'Unknown'}${h.production?' — '+h.production:''}</span>
            <span class="hist-amt">${fmt(h.total)}</span>
          </div>
          <div class="hist-meta">
            ${h.carnetNumber?`<strong style="color:var(--text2)">${h.carnetNumber}</strong> · `:''}
            ${h.direction?h.direction+' · ':''}
            ${h.commodity?h.commodity+' · ':''}
            ${new Date(h.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})}
          </div>
          <div class="hist-actions">
            <button class="btn btn-gold" style="font-size:12px;padding:6px 12px" onclick="viewHistPDF(${JSON.stringify(h).replace(/"/g,'&quot;').replace(/'/g,'&#39;')})">View PDF</button>
            <button class="btn" style="font-size:12px;padding:6px 12px" onclick="editFromHistory(${JSON.stringify(h).replace(/"/g,'&quot;').replace(/'/g,'&#39;')})">Edit & create new</button>
            <button class="btn-del" onclick="delHistItem(${h.id},event)" title="Delete">×</button>
          </div>
        </div>`).join('')
    }`;
}

// ── Tab switching ─────────────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['quote','history'][i]===tab));
  ['quote','history'].forEach(id=>{const e=document.getElementById('tab-'+id);if(e)e.style.display=id===tab?'block':'none';});
  if(tab==='history')renderHistory();
}

// ── Server status ─────────────────────────────────────────────────────
let svrStatus='checking';
function updateSvr(){
  const lbl={online:'Railway server online',offline:'Railway server offline',checking:'Checking server…'};
  document.querySelectorAll('.svrb').forEach(el=>{
    el.className=`sbadge s-${svrStatus} svrb`;
    el.innerHTML=`<span class="sdot"></span>${lbl[svrStatus]}`;
  });
}
function checkSvr(){fetch(API+'/api/health').then(r=>r.json()).then(()=>{svrStatus='online';updateSvr();}).catch(()=>{svrStatus='offline';updateSvr();});}
setInterval(checkSvr,15000);

// ══════════════════════════════════════════════════════════════════════
// ── QUOTE TAB ─────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════
let qSubTab='email';
let qEmailState={email:'',status:'idle',extracted:null,error:'',editing:false};

const BLANK_FORM={
  client:'',production:'',carnetNumber:'',direction:'Import',
  commodity:'',pieces:'',value:'',vehicleType:'',
  insuranceCountries:'',notes:''
};
let qForm={...BLANK_FORM};
let qStep=1;
let qResult=false; // true when showing quote

const EMAIL_EXAMPLE=`Hi team,

Need an ATA Carnet estimate for camera lenses. Client: Aura Lens. ATA Carnet # US42-2480245. 6 cases. Declared value $20,160 USD. Camera lenses for film production.

Thanks`;

function renderQuote(){
  const c=document.getElementById('tab-quote');
  if(!c)return;

  // ── Showing quote result ──
  if(qResult){
    c.innerHTML=`<div class="alert-success">✦ Quote ready — edit any line, add optional fees, then export.</div>`+quoteView(currentForm,'resetQuote()','editDetails()');
    return;
  }

  // ── Email edit screen ──
  if(qEmailState.editing){
    const ex=qEmailState.extracted;
    c.innerHTML=`<div class="alert-info" style="margin-bottom:12px">Edit extracted details then click Apply.</div>
    <div class="card">
      <div class="g2">
        <div class="field"><label>Client</label><input value="${ex.client||''}" oninput="qEmailState.extracted.client=this.value"></div>
        <div class="field"><label>Production</label><input value="${ex.production||''}" oninput="qEmailState.extracted.production=this.value"></div>
      </div>
      <div class="g2">
        <div class="field"><label>ATA Carnet #</label><input value="${ex.carnetNumber||''}" oninput="qEmailState.extracted.carnetNumber=this.value"></div>
        <div class="field"><label>Direction</label><select onchange="qEmailState.extracted.direction=this.value">
          <option${ex.direction==='Import'?' selected':''}>Import</option>
          <option${ex.direction==='Export'?' selected':''}>Export</option>
          <option${ex.direction==='Return'?' selected':''}>Return</option>
        </select></div>
      </div>
      <div class="field"><label>Commodity</label><input value="${ex.commodity||''}" oninput="qEmailState.extracted.commodity=this.value"></div>
      <div class="g2">
        <div class="field"><label>No. of pieces</label><input type="number" value="${ex.pieces||''}" oninput="qEmailState.extracted.pieces=this.value"></div>
        <div class="field"><label>Declared value (USD)</label><input type="number" value="${ex.value||''}" oninput="qEmailState.extracted.value=this.value;rebuildFromEmail()"></div>
      </div>
      <div class="field"><label>Vehicle type (affects bond)</label><select onchange="qEmailState.extracted.vehicleType=this.value;rebuildFromEmail()">
        <option value=""${!ex.vehicleType?' selected':''}>General commodity</option>
        <option value="corp"${ex.vehicleType==='corp'?' selected':''}>Vehicle – Corporation</option>
        <option value="individual"${ex.vehicleType==='individual'?' selected':''}>Vehicle – Individual</option>
      </select></div>
      <div class="field"><label>Cargo insurance — countries visited (0 = none)</label>
        <input type="number" min="0" max="15" value="${ex.insuranceCountries||''}" oninput="qEmailState.extracted.insuranceCountries=this.value;rebuildFromEmail()">
        <span style="font-size:11px;color:var(--text3)">1–3: $0.96/$100 · 4–7: $1.26/$100 · 8–11: $1.86/$100 · 12–15: $2.16/$100 · Min $125</span>
      </div>
      <div class="field"><label>Notes</label><textarea style="min-height:48px;resize:vertical" oninput="qEmailState.extracted.notes=this.value">${ex.notes||''}</textarea></div>
      <div class="brow">
        <button class="btn" onclick="applyEmailEdit()">← Back to quote</button>
        <button class="btn btn-gold" onclick="applyEmailEdit()">Apply changes →</button>
      </div>
    </div>`;
    return;
  }

  const subBar=`<div class="sub-tabs">
    <button class="stab${qSubTab==='email'?' active':''}" onclick="qSubTab='email';renderQuote()">✉ Email agent</button>
    <button class="stab${qSubTab==='manual'?' active':''}" onclick="qSubTab='manual';renderQuote()">✎ Manual entry</button>
  </div>`;

  // ── Email agent ──
  if(qSubTab==='email'){
    c.innerHTML=`<span class="sbadge s-${svrStatus} svrb"><span class="sdot"></span>${{online:'Railway server online',offline:'Railway server offline',checking:'Checking server…'}[svrStatus]}</span>
    ${subBar}
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <label class="flabel">Paste client or employee email</label>
        <button class="btn" style="font-size:12px;padding:4px 10px" onclick="document.getElementById('q-email-txt').value=EMAIL_EXAMPLE;qEmailState.email=EMAIL_EXAMPLE">Load example ↗</button>
      </div>
      <textarea id="q-email-txt" class="email-area" placeholder="Paste any email with shipment details — AI will extract client, carnet number, declared value, commodity, and more…" oninput="qEmailState.email=this.value">${qEmailState.email.replace(/
/g,'&#10;')}</textarea>
      ${qEmailState.error?`<div class="alert-error" style="margin-top:8px">${qEmailState.error}</div>`:''}
      <div class="brow">
        <button class="btn btn-gold" onclick="parseEmail()"${qEmailState.status==='loading'?' disabled':''}>
          ${qEmailState.status==='loading'?'<span class="spin"></span>Reading email…':'✦ Generate quote from email'}
        </button>
      </div>
    </div>
    <div class="info-box"><strong>How it works</strong>The AI reads the email, extracts the shipment details, and builds the ATA Carnet billing schedule automatically. Review and edit before exporting.</div>`;
    return;
  }

  // ── Manual entry ──
  const f=qForm;
  const sb=stepBarHTML(qStep);

  if(qStep===1){
    c.innerHTML=subBar+sb+`<div class="card">
      <div class="sec-title">Job information</div>
      <div class="g2">
        <div class="field"><label>Client</label><input placeholder="e.g. Paramount Pictures" value="${f.client}" oninput="qForm.client=this.value"></div>
        <div class="field"><label>Production title</label><input placeholder="e.g. Mission Impossible 8" value="${f.production}" oninput="qForm.production=this.value"></div>
      </div>
      <div class="g2">
        <div class="field"><label>ATA Carnet #</label><input placeholder="e.g. US42-2480084" value="${f.carnetNumber}" oninput="qForm.carnetNumber=this.value"></div>
        <div class="field"><label>Direction</label><select onchange="qForm.direction=this.value">
          <option${f.direction==='Import'?' selected':''}>Import</option>
          <option${f.direction==='Export'?' selected':''}>Export</option>
          <option${f.direction==='Return'?' selected':''}>Return</option>
        </select></div>
      </div>
      <div class="field"><label>Commodity</label><input placeholder="e.g. Camera lenses, film props, wardrobe" value="${f.commodity}" oninput="qForm.commodity=this.value"></div>
      <div class="g2">
        <div class="field"><label>No. of pieces</label><input type="number" min="1" placeholder="e.g. 6" value="${f.pieces}" oninput="qForm.pieces=this.value"></div>
        <div class="field"><label>Declared value (USD)</label><input type="number" min="0" placeholder="e.g. 20160" value="${f.value}" oninput="qForm.value=this.value"></div>
      </div>
      <div class="field"><label>Notes / special instructions</label><textarea placeholder="Special handling, deadlines, pickup address…" style="min-height:48px;resize:vertical" oninput="qForm.notes=this.value">${f.notes}</textarea></div>
      <div class="brow"><button class="btn btn-gold" onclick="qStep=2;renderQuote()">Next →</button></div>
    </div>`;
    return;
  }

  // Step 2
  c.innerHTML=subBar+sb+`<div class="card">
    <div class="sec-title">Carnet details</div>
    <div class="field"><label>Vehicle type (affects bond fee calculation)</label>
      <select onchange="qForm.vehicleType=this.value">
        <option value=""${!f.vehicleType?' selected':''}>General commodity — 40% × value × 1.5%</option>
        <option value="corp"${f.vehicleType==='corp'?' selected':''}>Vehicle (Corporation) — 100% × value × 1.5%</option>
        <option value="individual"${f.vehicleType==='individual'?' selected':''}>Vehicle (Individual) — 150% × value × 1.5%</option>
      </select>
    </div>
    <div class="divider"></div>
    <div class="field"><label>Cargo insurance — number of countries visited (0 = none)</label>
      <input type="number" min="0" max="15" placeholder="e.g. 3" value="${f.insuranceCountries||''}" oninput="qForm.insuranceCountries=this.value">
      <span style="font-size:11px;color:var(--text3)">1–3 countries: $0.96/$100 · 4–7: $1.26/$100 · 8–11: $1.86/$100 · 12–15: $2.16/$100 · Minimum $125</span>
    </div>
    <div class="brow-split">
      <button class="btn" onclick="qStep=1;renderQuote()">← Back</button>
      <button class="btn btn-gold" onclick="genManualQuote()">Generate quote →</button>
    </div>
  </div>`;
}

function stepBarHTML(cur){
  const labels=['Job info','Carnet details'];
  let h='<div class="stepbar">';
  for(let i=1;i<=2;i++){
    const done=cur>i,act=cur===i;
    h+=`<div class="step-item"><div class="sdot2${done?' done':act?' active':''}">${done?'✓':i}</div><span class="step-lbl${act?' active':''}">${labels[i-1]}</span></div>`;
    if(i<2)h+='<div class="step-line"></div>';
  }
  return h+'</div>';
}

function genManualQuote(){
  currentForm={...qForm};
  const lines=buildQuoteLines(qForm);
  initEL(lines);
  qResult=true;
  renderQuote();
}

function resetQuote(){
  qResult=false;
  qStep=1;
  qForm={...BLANK_FORM};
  qEmailState={email:'',status:'idle',extracted:null,error:'',editing:false};
  userEdited=false;
  EL=[];
  renderQuote();
}

function editDetails(){
  // Save current EL before editing
  window._savedEL=[...EL];
  window._wasEdited=userEdited;
  qResult=false;
  qEmailState.editing=qEmailState.extracted?true:false;
  renderQuote();
}

function applyEmailEdit(){
  const ex=qEmailState.extracted;
  currentForm={...ex};
  const newLines=buildQuoteLines(ex);
  if(window._wasEdited&&window._savedEL){
    // Restore saved EL then smart merge
    EL=[...window._savedEL];
    smartMerge(newLines);
    userEdited=true;
  } else {
    initEL(newLines);
  }
  window._savedEL=null;window._wasEdited=false;
  qEmailState.editing=false;
  qResult=true;
  renderQuote();
}

function rebuildFromEmail(){
  // Live recalc when values change in edit view (don't touch EL yet)
}

async function parseEmail(){
  const txt=document.getElementById('q-email-txt')?.value||qEmailState.email;
  if(!txt.trim())return;
  qEmailState.email=txt;qEmailState.status='loading';qEmailState.error='';renderQuote();
  try{
    const res=await fetch(API+'/api/parse-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({emailBody:txt})});
    const data=await res.json();
    if(!res.ok||!data.success)throw new Error(data.error||'Server error');
    const p=data.data;
    // Map extracted fields to our form
    const form={
      client:p.client||'',
      production:p.production||'',
      carnetNumber:p.carnetNumber||'',
      direction:p.direction==='export'?'Export':p.direction==='return'?'Return':'Import',
      commodity:p.commodity||'',
      pieces:p.pieces||'',
      value:p.value||'',
      vehicleType:p.vehicleType||'',
      insuranceCountries:'',
      notes:p.notes||'',
    };
    qEmailState.extracted=form;
    currentForm={...form};
    const lines=buildQuoteLines(form);
    initEL(lines);
    qEmailState.status='done';
    qResult=true;
  }catch(err){
    qEmailState.error='Could not parse: '+err.message;
    qEmailState.status='idle';
  }
  renderQuote();
}

// ── Init ──────────────────────────────────────────────────────────────
checkSvr();
renderQuote();
renderHistory();
</script>
