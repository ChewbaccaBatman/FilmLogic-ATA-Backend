<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATA Carnet Billing — Film Logic</title>
<style>
:root{
  --bg:#0f0f0f;--bg2:#181818;--bg3:#222;--bg4:#2a2a2a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.2);
  --text:#f0ede8;--text2:#9e9b95;--text3:#5c5a56;
  --gold:#d4a843;--gold-bg:rgba(212,168,67,0.1);--gold-border:rgba(212,168,67,0.35);
  --green:#4db87a;--green-bg:#0d2418;--green-border:rgba(77,184,122,0.25);
  --red:#e05555;--red-bg:#2a0d0d;--red-border:rgba(224,85,85,0.2);
  --blue:#4a9fd4;--blue-bg:#0d1f2e;--blue-border:rgba(74,159,212,0.25);
  --r:8px;--rlg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
.app{max-width:800px;margin:0 auto;padding:0 20px 80px}

/* Header */
.hdr{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rlg);padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.hdr-logo{height:68px;width:auto;object-fit:contain;flex-shrink:0}
.hdr-right{text-align:right;font-size:11px;color:var(--text3);line-height:1.9}
.hdr-right a{color:var(--gold);text-decoration:none}

/* Main tabs */
.tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:0}
.tab{padding:10px 20px;font-size:13px;font-weight:500;background:none;border:none;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;transition:color 0.15s;margin-bottom:-0.5px}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover:not(.active){color:var(--text2)}
.tab-content{padding-top:20px}

/* Sub-tabs */
.sub-tabs{display:flex;gap:8px;margin-bottom:18px}
.stab{padding:7px 16px;font-size:12px;font-weight:500;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;transition:all 0.15s}
.stab.active{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold)}
.stab:hover:not(.active){color:var(--text2);border-color:var(--border3)}

/* Cards */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rlg);padding:20px;margin-bottom:12px}
.card-sm{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:10px}
.sec-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;padding-bottom:8px;border-bottom:.5px solid var(--border)}

/* Alerts/banners */
.banner{padding:9px 14px;border-radius:var(--r);font-size:12px;margin-bottom:14px;font-weight:500}
.banner-blue{background:var(--blue-bg);color:var(--blue);border:.5px solid var(--blue-border)}
.banner-gold{background:var(--gold-bg);color:var(--gold);border:.5px solid var(--gold-border)}
.alert-success{background:var(--green-bg);color:var(--green);border:.5px solid var(--green-border);padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:10px}
.alert-info{background:var(--blue-bg);color:var(--blue);border:.5px solid var(--blue-border);padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:10px}
.alert-error{background:var(--red-bg);color:var(--red);border:.5px solid var(--red-border);padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:10px}
.info-box{background:var(--bg3);border:.5px solid var(--border);border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--text3);line-height:1.7}
.info-box strong{color:var(--text2);display:block;margin-bottom:3px}

/* Form */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label,.flabel{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.field input,.field select,.field textarea,input.inp,select.inp{background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--r);padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus,input.inp:focus,select.inp:focus{border-color:var(--gold)}
.field input::placeholder,.field textarea::placeholder,input.inp::placeholder{color:var(--text3)}
.field select option{background:var(--bg3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.divider{height:.5px;background:var(--border);margin:14px 0}
.cbrow{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);cursor:pointer;padding:5px 0;user-select:none}
.cbrow input[type=checkbox]{width:14px;height:14px;accent-color:var(--gold);flex-shrink:0}
.cbgrid{display:grid;grid-template-columns:1fr 1fr;gap:2px}

/* Buttons */
.btn{padding:8px 18px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--text2);font-family:inherit;transition:all .15s}
.btn:hover{color:var(--text);border-color:var(--border3)}
.btn-gold{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold)}
.btn-gold:hover{background:rgba(212,168,67,.18)}
.btn-green{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.btn-green:hover{background:rgba(77,184,122,.12)}
.btn-red{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.brow{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.brow-split{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:16px;flex-wrap:wrap}

/* Status */
.sbadge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;margin-bottom:14px}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.s-online{background:var(--green-bg);color:var(--green)}.s-online .sdot{background:var(--green)}
.s-offline{background:var(--red-bg);color:var(--red)}.s-offline .sdot{background:var(--red)}
.s-checking{background:var(--bg3);color:var(--text3)}.s-checking .sdot{background:var(--text3)}

/* Metrics */
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.metric{background:var(--bg3);border-radius:var(--r);padding:12px 14px}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.metric-value{font-size:16px;font-weight:600;color:var(--text)}
.mv-warn{color:var(--gold)}.mv-good{color:var(--green)}

/* Pills */
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pill{display:inline-flex;align-items:center;font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px}
.pill-n{background:var(--bg3);color:var(--text2);border:.5px solid var(--border)}
.pill-b{background:var(--blue-bg);color:var(--blue);border:.5px solid var(--blue-border)}
.pill-g{background:var(--gold-bg);color:var(--gold);border:.5px solid var(--gold-border)}

/* Billing table */
.btbl-hdr{display:grid;grid-template-columns:28px 1fr 120px 32px;gap:8px;padding:4px 0 8px;border-bottom:.5px solid var(--border);margin-bottom:2px}
.btbl-hdr span{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.brow-item{display:grid;grid-template-columns:28px 1fr 120px 32px;gap:8px;align-items:center;padding:3px 0;border-bottom:.5px solid var(--border);cursor:grab}
.brow-item:active{cursor:grabbing;opacity:.5}
.brow-item.drag-over{border-top:2px solid var(--gold)}
.drag-handle{color:var(--text3);font-size:15px;cursor:grab;display:flex;align-items:center;justify-content:center;padding:4px;border-radius:4px;transition:color .15s;user-select:none}
.drag-handle:hover{color:var(--text2)}
.bil-inp-lbl{background:transparent;border:.5px solid transparent;border-radius:var(--r);padding:5px 6px;color:var(--text2);font-size:13px;font-family:inherit;outline:none;width:100%;transition:all .15s}
.bil-inp-lbl:hover{border-color:var(--border2)}
.bil-inp-lbl:focus{border-color:var(--gold);background:var(--bg3);color:var(--text)}
.bil-inp-amt{background:transparent;border:.5px solid transparent;border-radius:var(--r);padding:5px 8px;color:var(--text);font-size:13px;font-weight:600;font-family:inherit;outline:none;text-align:right;width:100%;transition:all .15s}
.bil-inp-amt:hover{border-color:var(--border2)}
.bil-inp-amt:focus{border-color:var(--gold);background:var(--bg3)}
.bil-free{font-size:11px;background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:20px;font-weight:600;text-align:center;white-space:nowrap}
.bil-tbd{font-size:12px;color:var(--text3);text-align:right;font-style:italic}
.btn-del{width:28px;height:28px;background:transparent;border:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;border-radius:4px;transition:all .15s}
.btn-del:hover{color:var(--red);background:var(--red-bg)}
.bil-total{display:flex;justify-content:space-between;padding:12px 0 0;margin-top:8px;border-top:1px solid rgba(255,255,255,.12)}
.bil-total-lbl{font-size:13px;font-weight:600;color:var(--text)}
.bil-total-amt{font-size:18px;font-weight:700;color:var(--gold)}
.add-line{border-top:.5px solid var(--border);margin-top:12px;padding-top:12px}
.add-line-grid{display:grid;grid-template-columns:1fr 120px 80px;gap:8px;align-items:center;margin-top:6px}
.add-line-grid input{background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--r);padding:7px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none}
.add-line-grid input:focus{border-color:var(--gold)}
.add-line-grid input::placeholder{color:var(--text3)}
.slbl-row{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.edit-hint{font-size:11px;color:var(--text3);font-style:italic;font-weight:400;text-transform:none;letter-spacing:0}

/* Dim section */
.dim-hdr{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 36px;gap:8px;margin-bottom:4px}
.dim-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 36px;gap:8px;align-items:end;margin-bottom:8px}
.dim-lbl{font-size:11px;color:var(--text3)}
.btn-rm{width:36px;height:36px;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--r);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.btn-rm:hover{color:var(--red);border-color:var(--red-border)}
.btn-add-dim{padding:6px 12px;font-size:12px;border:.5px dashed var(--border2);border-radius:var(--r);background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;margin-top:4px;transition:all .15s}
.btn-add-dim:hover{color:var(--text2);border-color:var(--border3)}

/* Steps */
.stepbar{display:flex;align-items:center;margin-bottom:20px}
.step-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.sdot2{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:.5px solid var(--border2);background:var(--bg3);color:var(--text3)}
.sdot2.active{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold)}
.sdot2.done{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.step-lbl{font-size:11px;color:var(--text3);white-space:nowrap}
.step-lbl.active{color:var(--text2)}
.step-line{flex:1;height:.5px;background:var(--border);align-self:center;margin-bottom:16px}

/* History */
.hist-search{display:flex;gap:8px;margin-bottom:14px}
.hist-item{background:var(--bg3);border:.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.hist-item:hover{border-color:var(--gold)}
.hist-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px}
.hist-client{font-size:13px;font-weight:500;color:var(--text)}
.hist-amt{font-size:14px;font-weight:600;color:var(--gold)}
.hist-meta{font-size:11px;color:var(--text3)}
.hist-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.hist-type-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;margin-left:6px;text-transform:uppercase;letter-spacing:.05em}
.badge-import{background:var(--blue-bg);color:var(--blue)}
.badge-export{background:var(--gold-bg);color:var(--gold)}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(212,168,67,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}

/* Textarea */
textarea.email-area{width:100%;min-height:160px;resize:vertical;background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--r);padding:10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;line-height:1.6}
textarea.email-area:focus{border-color:var(--gold)}

@media(max-width:600px){
  .g2,.g3{grid-template-columns:1fr}
  .metrics{grid-template-columns:1fr 1fr}
  .hdr{flex-direction:column;align-items:flex-start}
  .hdr-right{text-align:left}
  .brow-split{flex-direction:column;align-items:stretch}
  .btbl-hdr,.brow-item{grid-template-columns:24px 1fr 90px 28px}
  .add-line-grid{grid-template-columns:1fr 90px 60px}
  .hist-search{flex-direction:column}
}
</style>
</head>

const REGION_NAMES={us:"United States",canada:"Canada",mexico:"Mexico",europe:"Europe",japan:"Japan",asia:"Asia Pacific",aus:"Australia",nz:"New Zealand",me:"Middle East",india:"India",latam:"Latin America & Caribbean",africa:"Africa",pacific:"Pacific Islands",other:"Other"};
const LAX_BASE=["lax","lgb"];

function isOutport(k){return k&&!LAX_BASE.includes(k)}
function apName(k){if(!k)return"—";const a=AIRPORTS.find(x=>x.k===k);if(a){const p=a.l.split("–");return p[0].trim();}return k.toUpperCase();}
function apDelivery(k){const a=AIRPORTS.find(x=>x.k===k);return a?a.d:200;}
function apRegion(k){const a=AIRPORTS.find(x=>x.k===k);return a?a.r:"other";}

function buildApOptions(sel){
  const groups={};
  AIRPORTS.forEach(a=>{const g=REGION_NAMES[a.r]||a.r;if(!groups[g])groups[g]=[];groups[g].push(a);});
  return Object.entries(groups).map(([g,aps])=>`<optgroup label="${g}">${aps.map(a=>`<option value="${a.k}"${sel===a.k?" selected":""}>${a.l}${LAX_BASE.includes(a.k)?" ★":""}</option>`).join("")}</optgroup>`).join("");
}

// ── Helpers ───────────────────────────────────────────────────────────
function fmt(n){return Number(n||0).toLocaleString("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtKg(n){return Math.round(n*10)/10}
function pd(s){return parseFloat(String(s||0).replace(/[$,]/g,""))||0}

function calcDimWt(pieces){
  return pieces.reduce((s,p)=>{
    const l=parseFloat(p.l)||0,w=parseFloat(p.w)||0,h=parseFloat(p.h)||0,q=parseInt(p.qty)||1;
    return s+((l*w*h)/166/2.20462)*q;
  },0);
}
function getWt(actualKg,dimPieces){
  const a=parseFloat(actualKg)||0;
  const d=Math.round(calcDimWt(dimPieces||[])*100)/100;
  return{actual:a,dim:d,chargeable:Math.max(a,d),useDim:d>a};
}
function getDelivery(k,mi){
  const b=apDelivery(k);
  return mi>50?Math.round(b+(mi-30)*1.8):b;
}

// ── Fee functions ─────────────────────────────────────────────────────
function councilFee(v){if(v<10000)return 305;if(v<50000)return 350;if(v<150000)return 415;if(v<400000)return 475;if(v<1000000)return 530;return 595;}
function bondFee(v,vt){const m=vt==="corp"?1.0:vt==="individual"?1.5:0.40;return Math.max(Math.round(v*m*0.015*100)/100,125);}
function issuanceFee(v){if(v<10000)return 150;if(v<50000)return 200;if(v<150000)return 250;if(v<400000)return 300;if(v<1000000)return 350;return 400;}
function insuranceFee(v,n){
  if(!n||n<=0)return 0;
  const r=n<=3?0.0096:n<=7?0.0126:n<=11?0.0186:0.0216;
  return Math.max(Math.round(v*r*100)/100,125);
}
function foreignCharges(r,pcs,kg){
  const b={us:0,canada:295,mexico:925,europe:450,japan:1160,asia:795,aus:1200,nz:1200,me:1350,india:900,latam:1100,africa:1500,pacific:1300,other:800}[r]||600;
  return(pcs>10||kg>500)?Math.round(b*1.15):b;
}

// ── Carnet issuance lines (shared) ────────────────────────────────────
function addIssuanceLines(lines,f,val,now48){
  lines.push({l:"US Council Carnet Charges",a:councilFee(val)});
  lines.push({l:"Carnet Bond Fee",a:bondFee(val,f.vehicleType||"")});
  lines.push({l:"Carnet Issuance",a:issuanceFee(val)});
  lines.push({l:"ATA Carnet Closing Fees",a:75});
  if(f.hasExpediteCarnet||now48)lines.push({l:"Expedite Fees"+(now48?" (Within 48hrs)":""),a:250});
  if(f.hasContinuationSheet)lines.push({l:"General List Continuation Sheet",a:17});
  if(f.hasCounterfoilVouchers)lines.push({l:"Additional Counterfoil Vouchers",a:30});
  if(f.hasReorder)lines.push({l:"Minimum for Reorder (Counterfoil/Vouchers)",a:100});
  if(f.hasLostDoc)lines.push({l:"Lost Document Fee",a:45});
  if(f.hasOffSitePrinting)lines.push({l:"Off-Site Printing Fee",a:100});
  if(f.hasExtension)lines.push({l:"Extension Application Fee",a:375});
  if(f.hasActivation)lines.push({l:"Activation Fee",a:275});
}

// ── BUILD IMPORT QUOTE ────────────────────────────────────────────────
function buildImport(f){
  const val=pd(f.value),pcs=parseInt(f.pieces)||1;
  const wi=getWt(f.weightKg,f.dimPieces||[]);
  const mi=pd(f.deliveryMiles)||20;
  const out=isOutport(f.destAirport);
  const now48=f.within48hrs||false;
  const lines=[],tbd=[];

  lines.push({l:"Duties & Taxes (ATA Carnet)",a:0,note:"Free"});
  lines.push({l:"ACE User Fees",a:24.50});
  lines.push({l:"Brokerage Fees – ATA Carnet",a:195.00});
  lines.push({l:"CTPAT Fees",a:25.00});
  lines.push({l:"TSA Cyber Security Fee",a:12.50});
  lines.push({l:"Messenger Fees",a:out?125:95});
  if(out)lines.push({l:"Outport – Any port other than LAX/LGB",a:150.00});
  lines.push({l:"Import Service Fees at Cost",a:295.00});
  lines.push({l:"Disbursement Fees",a:25.00});

  if(f.destAirport&&f.destAirport!=="other"){
    const del=getDelivery(f.destAirport,mi);
    lines.push({l:apName(f.destAirport)+" Airport Recovery & Delivery",a:del});
    lines.push({l:"Fuel Surcharge",a:Math.round(del*0.475)});
  }

  // Foreign charges (only if origin is not US)
  if(f.originAirport&&f.originAirport!=="other"){
    const reg=apRegion(f.originAirport);
    if(reg!=="us"){
      const fc=foreignCharges(reg,pcs,wi.chargeable);
      if(fc>0)lines.push({l:"Foreign Charges in "+REGION_NAMES[reg],a:fc});
    }
  }

  if(f.freightType==="priority"&&f.priorityFee)lines.push({l:"Priority Airfreight Surcharge",a:pd(f.priorityFee)});
  if(f.hasOvertime)lines.push({l:"Overtime Services",a:200});else tbd.push("Overtime Services – $200.00 (If Applicable)");
  if(f.hasGPS)lines.push({l:"GPS Trackers",a:125});
  if(f.hasLostGPS)lines.push({l:"Lost GPS Trackers",a:175});
  if(f.hasAirlineRecovery)lines.push({l:"ATA Carnet Airline Recovery",a:135});
  tbd.push("3% Credit Card Fee (If Applicable)");
  tbd.push("Waiting Time – $65.00/hr after first 30 min free (If Applicable)");

  if(f.includeCarnetIssuance)addIssuanceLines(lines,f,val,now48);

  const ins=f.cargoInsuranceCountries&&parseInt(f.cargoInsuranceCountries)>0?insuranceFee(val,parseInt(f.cargoInsuranceCountries)):0;
  if(ins>0)lines.push({l:`Cargo Insurance (${f.cargoInsuranceCountries} countries)`,a:ins});

  const sub=lines.reduce((s,x)=>s+(x.note==="Free"?0:pd(x.a)),0);
  return{lines,tbd,sub,wi,type:"import"};
}

// ── BUILD EXPORT QUOTE ────────────────────────────────────────────────
function buildExport(f){
  const val=pd(f.value),pcs=parseInt(f.pieces)||1;
  const wi=getWt(f.weightKg,f.dimPieces||[]);
  const mi=pd(f.collectionMiles)||20;
  const now48=f.within48hrs||false;
  const lines=[],tbd=[];

  if(f.hasOvertimeExport)lines.push({l:"Export Brokerage – Validation/Execution (Overtime)",a:200});
  else lines.push({l:"Export Brokerage – Validation/Execution (2-3 Business Days)",a:150});

  lines.push({l:"CTPAT Fees",a:25.00});
  lines.push({l:"Messenger Fees",a:95.00});
  lines.push({l:"Disbursement Fees",a:25.00});

  if(f.originAirport&&f.originAirport!=="other"){
    const del=getDelivery(f.originAirport,mi);
    lines.push({l:"Collection & Delivery to "+apName(f.originAirport),a:del});
    lines.push({l:"Fuel Surcharge",a:Math.round(del*0.475)});
  }

  if(f.freightType==="priority"&&f.priorityFee)lines.push({l:"Priority Airfreight Surcharge",a:pd(f.priorityFee)});
  if(f.hasOvertime)lines.push({l:"Overtime Services",a:200});else tbd.push("Overtime Services – $200.00 (If Applicable)");
  if(f.hasGPS)lines.push({l:"GPS Trackers",a:125});
  if(f.hasLostGPS)lines.push({l:"Lost GPS Trackers",a:175});
  tbd.push("3% Credit Card Fee (If Applicable)");
  tbd.push("Waiting Time – $65.00/hr after first 30 min free (If Applicable)");

  if(f.includeCarnetIssuance)addIssuanceLines(lines,f,val,now48);

  const ins=f.cargoInsuranceCountries&&parseInt(f.cargoInsuranceCountries)>0?insuranceFee(val,parseInt(f.cargoInsuranceCountries)):0;
  if(ins>0)lines.push({l:`Cargo Insurance (${f.cargoInsuranceCountries} countries)`,a:ins});

  const sub=lines.reduce((s,x)=>s+(x.note==="Free"?0:pd(x.a)),0);
  return{lines,tbd,sub,wi,type:"export"};
}

let EL=[],ETBD=[],newLbl="",newAmt="";
let dragIdx=null;

function initEL(result){EL=result.lines.map(x=>({...x}));ETBD=[...result.tbd];newLbl="";newAmt="";}

// ── Smart merge: update system-generated lines with new values,
//    preserve manual edits (custom labels, reordering, deletions, additions)
function smartMergeLines(newLines){
  // Build a map of canonical label → new amount from freshly calculated lines
  const newMap={};
  newLines.forEach(x=>{newMap[normalizeLabel(x.l)]={a:x.a,note:x.note};});

  // Update existing EL lines that match a system-generated line by label
  // If the user renamed a line it won't match — leave it alone
  EL=EL.map(x=>{
    const key=normalizeLabel(x.l);
    if(newMap[key]!==undefined){
      // Update amount from recalculated value, but keep user's label
      const updated={...x,a:newMap[key].a};
      if(newMap[key].note)updated.note=newMap[key].note;
      else delete updated.note;
      return updated;
    }
    return x; // user-added or renamed line — leave untouched
  });

  // Add any new system lines that don't exist in EL yet
  // (e.g. user added outport, new fee from changed form)
  newLines.forEach(x=>{
    const key=normalizeLabel(x.l);
    const exists=EL.some(e=>normalizeLabel(e.l)===key);
    if(!exists){
      // Insert before any user-added custom lines (heuristic: insert before last group)
      EL.push({...x});
    }
  });

  // Remove system lines that no longer apply
  // (e.g. outport fee removed because user changed to LAX)
  // Only remove lines whose label matches a known system label NOT in newMap
  const allSystemLabels=getAllSystemLabels();
  EL=EL.filter(x=>{
    const key=normalizeLabel(x.l);
    // If it's a known system line and it's no longer in newMap, remove it
    if(allSystemLabels.has(key)&&!newMap[key])return false;
    return true;
  });

  refreshTotal();
}

function normalizeLabel(s){
  return(s||"").toLowerCase().replace(/[^a-z0-9]/g,"").trim();
}

function getAllSystemLabels(){
  // All possible system-generated line labels (normalized)
  return new Set([
    "dutiesandtaxesatacarnet","aceuserfees",
    "brokeragefeesatacarnet","ctpatfees",
    "tsacybersecurityfee","messengerfees",
    "outportanyportotherthanlaxlgb",
    "importservicefeesatcost","disbursementfees",
    "fuelsurcharge","liftgate","overtimeservices",
    "gpstrackers","lostgpstrackers",
    "atacarnetairlinerecovery",
    "exportbrokeragevalidationexecution2",
    "exportbrokeragevalidationexecutionovertime",
    "priorityairfreightsurcharge",
    "uscounselcarnetcharges","uscounsilcarnetcharges",
    "uscouncilcarnetcharges","carnetbondfee",
    "carnetissuance","atacarnetclosingfees",
    "expeditefees","expeditefeeswithinhrs",
    "generallistcontinuationsheet",
    "additionalcounterfoilvouchers",
    "minimumforreordercounterfoilvouchers",
    "lostdocumentfee","offsiteprintingfee",
    "extensionapplicationfee","activationfee",
    "cargoinsurance",
    // airport delivery lines are matched by partial content
  ].concat(
    // Add all possible airport delivery line patterns
    ["airportrecoverydelivery","collectiondeliveryto",
     "airportrecovery","recoverydelivery"]
  ));
}
function elTotal(){return EL.reduce((s,x)=>s+(x.note==="Free"?0:pd(x.a)),0);}
let userEditedLines=false; // tracks if user has manually edited billing lines

function markUserEdited(){
  userEditedLines=true;
  if(impEmailState.status==="done")impEmailState.userEdited=true;
  if(expEmailState.status==="done")expEmailState.userEdited=true;
}

function updLbl(i,v){EL[i].l=v;markUserEdited();refreshTotal();}
function updAmt(i,v){EL[i].a=pd(v);if(EL[i].note!=="Free")delete EL[i].note;markUserEdited();refreshTotal();}
function delLine(i){EL.splice(i,1);markUserEdited();refreshTotal();rerenderBT();}
function delTbd(i){ETBD.splice(i,1);markUserEdited();rerenderBT();}
function addLine(){
  const lbl=document.getElementById("nl-lbl")?.value||newLbl;
  const amt=document.getElementById("nl-amt")?.value||newAmt;
  if(!lbl.trim())return;
  EL.push({l:lbl,a:pd(amt)||0});
  newLbl="";newAmt="";
  rerenderBT();refreshTotal();
}
function refreshTotal(){
  const t=elTotal();
  ["bt-total","metric-total"].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=fmt(t);});
}
function rerenderBT(){
  const w=document.getElementById("bt-wrap");
  if(w)w.innerHTML=billingTableHTML();
}

function dStart(e,i){dragIdx=i;e.currentTarget.classList.add("dragging");e.dataTransfer.effectAllowed="move";}
function dEnd(e){e.currentTarget.classList.remove("dragging");document.querySelectorAll(".brow-item").forEach(r=>r.classList.remove("drag-over"));}
function dOver(e,i){e.preventDefault();document.querySelectorAll(".brow-item").forEach(r=>r.classList.remove("drag-over"));if(dragIdx!==null&&dragIdx!==i)e.currentTarget.classList.add("drag-over");}
function dDrop(e,i){e.preventDefault();if(dragIdx===null||dragIdx===i)return;const m=EL.splice(dragIdx,1)[0];EL.splice(i,0,m);dragIdx=null;markUserEdited();rerenderBT();refreshTotal();}

function billingTableHTML(){
  const rows=EL.map((x,i)=>`
    <div class="brow-item" draggable="true" ondragstart="dStart(event,${i})" ondragend="dEnd(event)" ondragover="dOver(event,${i})" ondrop="dDrop(event,${i})">
      <div class="drag-handle" title="Drag to reorder">⠿</div>
      <input class="bil-inp-lbl" value="${(x.l||"").replace(/"/g,"&quot;")}" oninput="updLbl(${i},this.value)" placeholder="Line item">
      ${x.note==="Free"?`<div class="bil-free">Free</div>`:
        `<input class="bil-inp-amt" value="${fmt(x.a||0)}" onfocus="this.value='${pd(x.a)||0}'" onblur="this.value=fmt(pd(this.value));updAmt(${i},this.value)" oninput="updAmt(${i},this.value)">`}
      <button class="btn-del" onclick="delLine(${i})" title="Remove">×</button>
    </div>`).join("");
  const tbdRows=ETBD.map((t,i)=>`
    <div class="brow-item">
      <div class="drag-handle" style="opacity:.25">⠿</div>
      <span style="font-size:12px;color:var(--text3)">${t}</span>
      <div class="bil-tbd">TBD</div>
      <button class="btn-del" onclick="delTbd(${i})">×</button>
    </div>`).join("");
  return `
    <div class="btbl-hdr"><span></span><span>Description</span><span style="text-align:right">Amount</span><span></span></div>
    ${rows}${tbdRows?`<div style="margin-top:4px">${tbdRows}</div>`:""}

      <div style="font-size:11px;color:var(--text3);margin-bottom:4px">+ Add custom line item</div>
      <div class="add-line-grid">
        <input id="nl-lbl" placeholder="Description" oninput="newLbl=this.value">
        <input id="nl-amt" placeholder="$0.00" type="number" oninput="newAmt=this.value">
        <button class="btn btn-gold" style="padding:7px 10px;font-size:12px" onclick="addLine()">Add</button>
      </div>
    </div>`;
}

function flushBillingInputs(){
  // Read all currently visible billing inputs and sync to EL
  // This catches any edits where the input hasn't blurred yet
  const wrap=document.getElementById("bt-wrap");
  if(!wrap)return;
  const labelInputs=wrap.querySelectorAll(".bil-inp-lbl");
  const amtInputs=wrap.querySelectorAll(".bil-inp-amt");
  labelInputs.forEach((inp,i)=>{if(i<EL.length&&inp.value.trim())EL[i].l=inp.value.trim();});
  amtInputs.forEach((inp,i)=>{if(i<EL.length){const v=pd(inp.value);if(v>=0)EL[i].a=v;}});
}

function copyQuote(form,result,skipSave){
  if(!form||!result)return;
  flushBillingInputs();
  if(!skipSave)saveHistory(form,result);
  const wi=result.wi||{};
  const isExp=result.type==="export";
  let t=`* * * ATA CARNET ${isExp?"EXPORT":"IMPORT"} CLEARANCE & DELIVERY * * *\n`;
  if(form.carnetNumber)t+=`ATA CARNET # ${form.carnetNumber}\n`;
  if(form.client)t+=`Client: ${form.client}\n`;
  if(form.production)t+=`Production: ${form.production}\n`;
  if(form.pieces)t+=`${form.pieces} PCS / ${fmtKg(wi.chargeable||0)} KGS CHARGEABLE WT / VALUE $${(pd(form.value)||0).toLocaleString()} USD\n`;
  if(form.commodity)t+=`Commodity: ${form.commodity}\n`;
  if(form.originAirport||form.origin)t+=`Origin: ${apName(form.originAirport||form.origin)}\n`;
  if(form.destAirport)t+=`Destination: ${apName(form.destAirport)}\n`;
  t+="\n";
  EL.forEach(x=>{t+=`${x.l}\t${x.note==="Free"?"Free":fmt(x.a)}\n`;});
  ETBD.forEach(x=>{t+=`${x}\tTBD\n`;});
  t+=`\nESTIMATED TOTAL (Not Including TBD Charges)\t${fmt(elTotal())}\n`;
  t+="\nValidity of this estimate is 7 days and is subject to change.";
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.getElementById("copy-btn");
    if(b){b.textContent="Copied!";setTimeout(()=>{b.textContent="Copy quote"},2000);}
  });
}

// ── History ───────────────────────────────────────────────────────────
const HK="fl_ata_history_v2";
function loadHistory(){try{return JSON.parse(localStorage.getItem(HK))||[];}catch(e){return[];}}
function saveHistory(form,result){
  const h=loadHistory();
  h.unshift({id:Date.now(),ts:new Date().toISOString(),client:form.client||"Unknown",production:form.production||"",carnetNumber:form.carnetNumber||"",commodity:form.commodity||"",originAirport:form.originAirport||form.origin||"",destAirport:form.destAirport||"",total:elTotal(),type:result.type||"import",form:{...form},lines:[...EL],tbd:[...ETBD]});
  if(h.length>100)h.splice(100);
  try{localStorage.setItem(HK,JSON.stringify(h));}catch(e){}
}
function delHistItem(id){
  const h=loadHistory().filter(x=>x.id!==id);
  try{localStorage.setItem(HK,JSON.stringify(h));}catch(e){}
  renderHistory();
}
function clearHistory(){if(!confirm("Clear all quote history?"))return;try{localStorage.removeItem(HK);}catch(e){}renderHistory();}

function loadFromHistory(item){
  EL=[...item.lines];
  ETBD=[...item.tbd];
  currentForm={...item.form};
  currentResult={lines:item.lines,tbd:item.tbd,sub:item.total,wi:getWt(item.form.weightKg,item.form.dimPieces||[]),type:item.type||"import"};
  // Open PDF without saving a new history entry
  exportPDF(currentForm,currentResult,true);
}

function renderHistory(){
  const c=document.getElementById("tab-history");
  if(!c)return;
  const q=document.getElementById("hist-search-input")?.value||"";
  const all=loadHistory();
  const filtered=q.trim()?all.filter(h=>(h.client||"").toLowerCase().includes(q.toLowerCase())||(h.carnetNumber||"").toLowerCase().includes(q.toLowerCase())||(h.production||"").toLowerCase().includes(q.toLowerCase())):all;

  c.innerHTML=`
    <div class="hist-search">
      <input id="hist-search-input" class="inp" placeholder="&#128269; Search by client name, carnet number, or production…" value="${q}" oninput="renderHistory()" style="flex:1">
      ${all.length?`<button class="btn btn-red" style="padding:8px 14px;font-size:12px;flex-shrink:0" onclick="clearHistory()">Clear all</button>`:""}
    </div>
    ${!all.length?`<div class="hist-empty">No quotes saved yet.<br><span style="font-size:12px;margin-top:6px;display:block">Quotes are automatically saved when you export PDF or copy.</span></div>`:
      !filtered.length?`<div class="hist-empty">No results for "<strong>${q}</strong>"</div>`:
      `<div style="font-size:12px;color:var(--text3);margin-bottom:10px">${filtered.length} result${filtered.length!==1?"s":""} found</div>`+
      filtered.map(h=>`
        <div class="hist-item" onclick="loadFromHistory(${JSON.stringify(h).replace(/"/g,"&quot;").replace(/'/g,"&#39;")})">
          <div class="hist-top">
            <span class="hist-client">${h.client||"Unknown"}${h.production?" — "+h.production:""}
              <span class="hist-type-badge ${h.type==="export"?"badge-export":"badge-import"}">${h.type==="export"?"Export":"Import"}</span>
            </span>
            <span class="hist-amt">${fmt(h.total)}</span>
          </div>
          <div class="hist-meta">
            ${h.carnetNumber?`<strong style="color:var(--text2)">${h.carnetNumber}</strong> · `:""}
            ${h.originAirport?apName(h.originAirport)+" → ":""}${h.destAirport?apName(h.destAirport)+" · ":""}
            ${h.commodity?h.commodity+" · ":""}
            ${new Date(h.ts).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"})}
            <button class="btn-del" style="margin-left:6px;vertical-align:middle" onclick="event.stopPropagation();delHistItem(${h.id})">×</button>
          </div>
        </div>`).join("")
    }`;
}

// ── Dim section helpers ───────────────────────────────────────────────
const DS={};
function dimSection(pieces,prefix){
  const rows=pieces.map((p,i)=>`
    <div class="dim-row">
      <div class="field" style="margin:0"><input type="number" min="0" step=".1" placeholder="e.g. 24" value="${p.l||""}" oninput="dUpd('${prefix}',${i},'l',this.value)"></div>
      <div class="field" style="margin:0"><input type="number" min="0" step=".1" placeholder="e.g. 18" value="${p.w||""}" oninput="dUpd('${prefix}',${i},'w',this.value)"></div>
      <div class="field" style="margin:0"><input type="number" min="0" step=".1" placeholder="e.g. 14" value="${p.h||""}" oninput="dUpd('${prefix}',${i},'h',this.value)"></div>
      <div class="field" style="margin:0"><input type="number" min="1" placeholder="1" value="${p.qty||1}" oninput="dUpd('${prefix}',${i},'qty',this.value)"></div>
      <button class="btn-rm" onclick="dRem('${prefix}',${i})">×</button>
    </div>`).join("");
  return `<div style="margin-bottom:12px">
    <label class="flabel" style="display:block;margin-bottom:8px">Cargo dimensions (inches)</label>
    <div class="dim-hdr"><span class="dim-lbl">L (in)</span><span class="dim-lbl">W (in)</span><span class="dim-lbl">H (in)</span><span class="dim-lbl">Qty</span><span></span></div>
    <div id="${prefix}-rows">${rows}</div>
    <button class="btn-add-dim" onclick="dAdd('${prefix}')">+ Add piece</button>
    <p style="font-size:11px;color:var(--text3);margin-top:6px">Dim. weight: L×W×H ÷ 166 ÷ 2.2046 = kgs (IATA standard)</p>
  </div>`;
}
function dInitDS(prefix,pieces){DS[prefix]=[...pieces.map(p=>({...p}))];}
function dAdd(prefix){DS[prefix]=DS[prefix]||[];DS[prefix].push({l:"",w:"",h:"",qty:"1"});dSync(prefix);dRender(prefix);}
function dRem(prefix,i){if(!DS[prefix])return;DS[prefix].splice(i,1);dSync(prefix);dRender(prefix);}
function dUpd(prefix,i,k,v){if(!DS[prefix]||!DS[prefix][i])return;DS[prefix][i][k]=v;dSync(prefix);}
function dSync(prefix){
  if(prefix==="imp-m")impForm.dimPieces=[...DS[prefix]];
  else if(prefix==="imp-e"&&impEmailState.extracted)impEmailState.extracted.dimPieces=[...DS[prefix]];
  else if(prefix==="exp-m")expForm.dimPieces=[...DS[prefix]];
  else if(prefix==="exp-e"&&expEmailState.extracted)expEmailState.extracted.dimPieces=[...DS[prefix]];
}
function dRender(prefix){
  const w=document.getElementById(prefix+"-rows");
  if(!w)return;
  w.innerHTML=(DS[prefix]||[]).map((p,i)=>`
    <div class="dim-row">
      <div class="field" style="margin:0"><input type="number" min="0" step=".1" placeholder="e.g. 24" value="${p.l||""}" oninput="dUpd('${prefix}',${i},'l',this.value)"></div>
      <div class="field" style="margin:0"><input type="number" min="0" step=".1" placeholder="e.g. 18" value="${p.w||""}" oninput="dUpd('${prefix}',${i},'w',this.value)"></div>
      <div class="field" style="margin:0"><input type="number" min="0" step=".1" placeholder="e.g. 14" value="${p.h||""}" oninput="dUpd('${prefix}',${i},'h',this.value)"></div>
      <div class="field" style="margin:0"><input type="number" min="1" placeholder="1" value="${p.qty||1}" oninput="dUpd('${prefix}',${i},'qty',this.value)"></div>
      <button class="btn-rm" onclick="dRem('${prefix}',${i})">×</button>
    </div>`).join("");
}

// ── Step bar ──────────────────────────────────────────────────────────
function stepBar(cur,total=3,labels=["Job details","Shipment","Services"]){
  let h='<div class="stepbar">';
  for(let i=1;i<=total;i++){
    const done=cur>i,act=cur===i;
    h+=`<div class="step-item"><div class="sdot2${done?" done":act?" active":""}">${done?"✓":i}</div><span class="step-lbl${act?" active":""}">${labels[i-1]}</span></div>`;
    if(i<total)h+='<div class="step-line"></div>';
  }
  return h+'</div>';
}

function genImpQuote(){
  impResult=buildImport(impForm);
  if(window._wasUserEdited&&window._savedEL){
    EL=window._savedEL;
    ETBD=window._savedETBD;
    smartMergeLines(impResult.lines);
    userEditedLines=true;
    window._savedEL=null;window._savedETBD=null;window._wasUserEdited=false;
  } else {
    initEL(impResult);
    userEditedLines=false;
  }
  renderImport();
}
function resetImpManual(){impStep=1;impResult=null;impForm={...impBlank};renderImport();}
function editImpManual(){
  // Save current EL before going back to edit
  window._savedEL=[...EL];
  window._savedETBD=[...ETBD];
  window._wasUserEdited=userEditedLines;
  impResult=null;
  renderImport();
}
function resetImpEmail(){impEmailState={email:"",status:"idle",extracted:null,result:null,error:"",editing:false};renderImport();}
function editImpEmail(){impEmailState.editing=true;renderImport();}
function applyImpEmail(){
  const r=buildImport(impEmailState.extracted);
  impEmailState.result=r;
  if(!impEmailState.userEdited){
    initEL(r);
  } else {
    smartMergeLines(r.lines);
  }
  impEmailState.editing=false;
  renderImport();
}

async function parseImpEmail(){
  const txt=document.getElementById("imp-email-txt")?.value||impEmailState.email;
  if(!txt.trim())return;
  impEmailState.email=txt;impEmailState.status="loading";impEmailState.error="";renderImport();
  try{
    const res=await fetch(API+"/api/parse-email",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({emailBody:txt})});
    const data=await res.json();
    if(!res.ok||!data.success)throw new Error(data.error||"Server error");
    const p=data.data;
    if(!p.dimPieces)p.dimPieces=[];
    if(!p.within48hrs){const lo=txt.toLowerCase();p.within48hrs=["48 hour","48hr","tomorrow","today","urgent","asap","within 2 day"].some(x=>lo.includes(x));}
    impEmailState.extracted=p;
    const r=buildImport(p);
    impEmailState.result=r;
    initEL(r);
    impEmailState.userEdited=false;
    userEditedLines=false;
    impEmailState.status="done";
  }catch(err){
    impEmailState.error="Could not parse: "+err.message;
    impEmailState.status="idle";
  }
  renderImport();
}

      <label class="cbrow"><input type="checkbox"${ex.within48hrs?" checked":""} onchange="expEmailState.extracted.within48hrs=this.checked"> Within 48 hours (auto-adds $250 expedite)</label>
      <div class="brow">
        <button class="btn" onclick="expEmailState.editing=false;applyExpEmail()">← Back</button>
        <button class="btn btn-gold" onclick="applyExpEmail()">Apply →</button>
      </div>
    </div>`;
    dInitDS("exp-e",ex.dimPieces||[]);
    return;
  }

  // ── Email agent ──
  if(expSubTab==="email"){
    c.innerHTML=`<span class="sbadge s-${svrStatus} svrb"><span class="sdot"></span>${{online:"Railway server online",offline:"Railway server offline",checking:"Checking server…"}[svrStatus]}</span>
    ${subBar}
    <div class="banner banner-gold">📤 <strong>ATA Carnet Export</strong> — gear or equipment LEAVING the United States</div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <label class="flabel">Paste client or employee email</label>
        <button class="btn" style="font-size:12px;padding:4px 10px" onclick="document.getElementById('exp-email-txt').value=EXP_EXAMPLE;expEmailState.email=EXP_EXAMPLE">Load example ↗</button>
      </div>
      <textarea id="exp-email-txt" class="email-area" placeholder="Paste any email with export shipment details…" oninput="expEmailState.email=this.value">${expEmailState.email.replace(/\n/g,"&#10;")}</textarea>
      ${expEmailState.error?`<div class="alert-error" style="margin-top:8px">${expEmailState.error}</div>`:""}
      <div class="brow">
        <button class="btn btn-gold" onclick="parseExpEmail()"${expEmailState.status==="loading"?" disabled":""}>
          ${expEmailState.status==="loading"?'<span class="spin"></span>Reading email…':"✦ Generate export quote from email"}
        </button>
      </div>
    </div>
    <div class="info-box"><strong>How it works</strong>The AI reads the email, extracts shipment details, and builds the export billing schedule using the correct export fee structure. Review and edit before exporting the PDF.</div>`;
    return;
  }

  // ── Manual export ──
  const f=expForm;
  const sb=stepBar(expStep,3,["Job details","Shipment","Services"]);

  if(expStep===1){c.innerHTML=subBar+sb+`<div class="card">
    <div class="banner banner-gold">📤 <strong>ATA Carnet Export</strong> — gear LEAVING the United States</div>
    <div class="sec-title">Job information</div>
    <div class="g2">
      <div class="field"><label>Client</label><input placeholder="e.g. Paramount Pictures" value="${f.client}" oninput="expForm.client=this.value"></div>
      <div class="field"><label>Production title</label><input placeholder="e.g. Mission Impossible 8" value="${f.production}" oninput="expForm.production=this.value"></div>
    </div>
    <div class="g2">
      <div class="field"><label>ATA Carnet #</label><input placeholder="e.g. US42-2480084" value="${f.carnetNumber}" oninput="expForm.carnetNumber=this.value"></div>
      <div class="field"><label>Declared value (USD)</label><input type="number" min="0" placeholder="e.g. 85000" value="${f.value}" oninput="expForm.value=this.value"></div>
    </div>
    <div class="field"><label>Commodity</label><input placeholder="e.g. Camera lenses, film props, wardrobe" value="${f.commodity}" oninput="expForm.commodity=this.value"></div>
    <div class="g2">
      <div class="field"><label>No. of pieces</label><input type="number" min="1" placeholder="e.g. 3" value="${f.pieces}" oninput="expForm.pieces=this.value"></div>
    </div>
    <div class="field"><label>Notes</label><textarea placeholder="Special instructions…" style="min-height:48px;resize:vertical" oninput="expForm.notes=this.value">${f.notes}</textarea></div>
    <div class="brow"><button class="btn btn-gold" onclick="expStep=2;renderExport()">Next: shipment →</button></div>
  </div>`;return;}

  if(expStep===2){c.innerHTML=subBar+sb+`<div class="card">
    <div class="sec-title">Shipment details</div>
    <div class="field"><label>Actual gross weight (KGS)</label><input type="number" min="0" step=".1" placeholder="e.g. 45" value="${f.weightKg}" oninput="expForm.weightKg=this.value"></div>
    ${dimSection(f.dimPieces,"exp-m")}
    <div class="divider"></div>
    <div class="g2">
      <div class="field"><label>US origin airport (pickup from)</label><select onchange="expForm.originAirport=this.value">${buildApOptions(f.originAirport||"lax")}</select></div>
      <div class="field"><label>Collection distance (miles from airport)</label><input type="number" min="0" value="${f.collectionMiles||20}" oninput="expForm.collectionMiles=this.value"></div>
    </div>
    <div class="field"><label>Foreign destination airport</label><select onchange="expForm.destAirport=this.value">${buildApOptions(f.destAirport||"")}</select></div>
    <div class="divider"></div>
    <div class="field"><label>Freight type</label><select onchange="expForm.freightType=this.value;renderExport()">
      <option value="general"${(f.freightType||"general")==="general"?" selected":""}>General airfreight</option>
      <option value="priority"${f.freightType==="priority"?" selected":""}>Priority airfreight</option>
    </select></div>
    ${f.freightType==="priority"?`<div class="field"><label>Priority surcharge (USD)</label><input type="number" placeholder="Enter amount" value="${f.priorityFee||""}" oninput="expForm.priorityFee=this.value"></div>`:""}
    <label class="cbrow"><input type="checkbox"${f.within48hrs?" checked":""} onchange="expForm.within48hrs=this.checked"> Carnet required within 48 hours (auto-adds $250 expedite fee)</label>
    <div class="brow-split">
      <button class="btn" onclick="expStep=1;renderExport()">← Back</button>
      <button class="btn btn-gold" onclick="expStep=3;renderExport()">Next: services →</button>
    </div>
  </div>`;
  dInitDS("exp-m",f.dimPieces);
  return;}

  // Step 3
  c.innerHTML=subBar+sb+`<div class="card">
    <div class="sec-title">Export brokerage</div>
    <div class="field"><label>Validation / execution timing</label><select onchange="expForm.hasOvertimeExport=this.value==='overtime'">
      <option value="standard"${!f.hasOvertimeExport?" selected":""}>Standard — 2-3 Business Days ($150.00)</option>
      <option value="overtime"${f.hasOvertimeExport?" selected":""}>Overtime / Rush ($200.00)</option>
    </select></div>
    <div class="divider"></div>
    <div class="sec-title">Additional services</div>
    <div class="cbgrid">
      <label class="cbrow"><input type="checkbox"${f.hasOvertime?" checked":""} onchange="expForm.hasOvertime=this.checked"> Overtime services (+$200)</label>
      <label class="cbrow"><input type="checkbox"${f.hasGPS?" checked":""} onchange="expForm.hasGPS=this.checked"> GPS Trackers (+$125)</label>
      <label class="cbrow"><input type="checkbox"${f.hasLostGPS?" checked":""} onchange="expForm.hasLostGPS=this.checked"> Lost GPS Trackers (+$175)</label>
    </div>
    <div class="divider"></div>
    <label class="cbrow"><input type="checkbox"${f.includeCarnetIssuance?" checked":""} onchange="expForm.includeCarnetIssuance=this.checked;renderExport()"> <strong>Include US Council carnet issuance fees</strong></label>
    ${f.includeCarnetIssuance?issuanceHTML(f,"expForm"):""}
    <div class="divider"></div>
    ${insHTML(f,"expForm")}
    <div class="brow-split">
      <button class="btn" onclick="expStep=2;renderExport()">← Back</button>
      <button class="btn btn-gold" onclick="genExpQuote()">Generate quote →</button>
    </div>
  </div>`;
}

function genExpQuote(){
  expResult=buildExport(expForm);
  if(window._wasUserEdited&&window._savedEL){
    EL=window._savedEL;
    ETBD=window._savedETBD;
    smartMergeLines(expResult.lines);
    userEditedLines=true;
    window._savedEL=null;window._savedETBD=null;window._wasUserEdited=false;
  } else {
    initEL(expResult);
    userEditedLines=false;
  }
  renderExport();
}
function resetExpManual(){expStep=1;expResult=null;expForm={...expBlank};renderExport();}
function editExpManual(){
  window._savedEL=[...EL];
  window._savedETBD=[...ETBD];
  window._wasUserEdited=userEditedLines;
  expResult=null;
  renderExport();
}
function resetExpEmail(){expEmailState={email:"",status:"idle",extracted:null,result:null,error:"",editing:false};renderExport();}
function editExpEmail(){expEmailState.editing=true;renderExport();}
function applyExpEmail(){
  const r=buildExport(expEmailState.extracted);
  expEmailState.result=r;
  if(!expEmailState.userEdited){
    initEL(r);
  } else {
    smartMergeLines(r.lines);
  }
  expEmailState.editing=false;
  renderExport();
}

async function parseExpEmail(){
  const txt=document.getElementById("exp-email-txt")?.value||expEmailState.email;
  if(!txt.trim())return;
  expEmailState.email=txt;expEmailState.status="loading";expEmailState.error="";renderExport();
  try{
    const res=await fetch(API+"/api/parse-email",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({emailBody:txt})});
    const data=await res.json();
    if(!res.ok||!data.success)throw new Error(data.error||"Server error");
    const p=data.data;
    if(!p.dimPieces)p.dimPieces=[];
    p.direction="export";
    if(!p.within48hrs){const lo=txt.toLowerCase();p.within48hrs=["48 hour","48hr","tomorrow","today","urgent","asap","within 2 day"].some(x=>lo.includes(x));}
    expEmailState.extracted=p;
    const r=buildExport(p);
    expEmailState.result=r;
    initEL(r);
    expEmailState.userEdited=false;
    userEditedLines=false;
    expEmailState.status="done";
  }catch(err){
    expEmailState.error="Could not parse: "+err.message;
    expEmailState.status="idle";
  }
  renderExport();
}

// ── Init ──────────────────────────────────────────────────────────────
checkSvr();
renderImport();
renderExport();
renderHistory();
</script>
