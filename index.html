<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATA Carnet Billing — Film Logic</title>
<style>
  :root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#232323;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0ede8;--text2:#9e9b95;--text3:#5c5a56;--accent:#d4a843;--green-bg:#0d2418;--green-text:#4db87a;--red-bg:#2a0d0d;--red-text:#e05555;--info-bg:#0d1f2e;--info-text:#4a9fd4;--warn-bg:#2a1f0a;--warn-text:#d4a843;--radius:8px;--radius-lg:12px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
  .app{max-width:760px;margin:0 auto;padding:0 20px 60px}
  .header{display:flex;align-items:center;gap:14px;padding:28px 0 24px;border-bottom:0.5px solid var(--border);margin-bottom:28px}
  .header-icon{width:38px;height:38px;background:rgba(212,168,67,0.12);border:0.5px solid rgba(212,168,67,0.3);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .header-icon svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .header-title{font-size:17px;font-weight:600;letter-spacing:-0.3px}
  .header-sub{font-size:12px;color:var(--text3);margin-top:2px;letter-spacing:0.04em;text-transform:uppercase}
  .tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:24px}
  .tab{padding:9px 20px;font-size:13px;font-weight:500;background:none;border:none;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:color 0.15s;margin-bottom:-0.5px}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab:hover:not(.active){color:var(--text2)}
  .card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px}
  .card-sm{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:10px}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
  .field label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em}
  .field input,.field select,.field textarea{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color 0.15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
  .field input::placeholder,.field textarea::placeholder{color:var(--text3)}
  .field select option{background:var(--bg3)}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .divider{height:0.5px;background:var(--border);margin:16px 0}
  .checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);cursor:pointer;padding:5px 0}
  .checkbox-row input[type=checkbox]{width:14px;height:14px;accent-color:var(--accent)}
  .checkbox-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px}
  .btn{padding:8px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--border2);background:transparent;color:var(--text2);transition:all 0.15s;font-family:inherit}
  .btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2)}
  .btn-primary{background:rgba(212,168,67,0.12);border-color:rgba(212,168,67,0.4);color:var(--accent)}
  .btn-primary:hover{background:rgba(212,168,67,0.2)}
  .btn-green{background:var(--green-bg);border-color:rgba(77,184,122,0.3);color:var(--green-text)}
  .btn-green:hover{background:rgba(77,184,122,0.12)}
  .btn:disabled{opacity:0.4;cursor:not-allowed}
  .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
  .btn-row-split{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:16px}
  .status-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;margin-bottom:14px}
  .status-dot{width:6px;height:6px;border-radius:50%}
  .status-online{background:var(--green-bg);color:var(--green-text)}.status-online .status-dot{background:var(--green-text)}
  .status-offline{background:var(--red-bg);color:var(--red-text)}.status-offline .status-dot{background:var(--red-text)}
  .status-checking{background:var(--bg3);color:var(--text3)}.status-checking .status-dot{background:var(--text3)}
  .alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:10px}
  .alert-success{background:var(--green-bg);color:var(--green-text);border:0.5px solid rgba(77,184,122,0.2)}
  .alert-info{background:var(--info-bg);color:var(--info-text);border:0.5px solid rgba(74,159,212,0.2)}
  .alert-warn{background:var(--warn-bg);color:var(--warn-text);border:0.5px solid rgba(212,168,67,0.2);border-left:3px solid var(--accent);border-radius:0 var(--radius) var(--radius) 0}
  .alert-error{background:var(--red-bg);color:var(--red-text);border:0.5px solid rgba(224,85,85,0.2)}
  .metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
  .metric{background:var(--bg3);border-radius:var(--radius);padding:12px 14px}
  .metric-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em}
  .metric-value{font-size:16px;font-weight:600;color:var(--text)}
  .metric-value.warn{color:var(--warn-text)}.metric-value.good{color:var(--green-text)}
  .weight-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px}
  .pill-neutral{background:var(--bg3);color:var(--text2);border:0.5px solid var(--border)}
  .pill-active{background:var(--info-bg);color:var(--info-text);border:0.5px solid rgba(74,159,212,0.3)}
  .pill-warn{background:var(--warn-bg);color:var(--warn-text);border:0.5px solid rgba(212,168,67,0.3)}
  .meta-row{display:flex;gap:20px;flex-wrap:wrap;font-size:13px}
  .meta-item span:first-child{color:var(--text3)}
  .dim-header{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 36px;gap:8px;margin-bottom:4px}
  .dim-row-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 36px;gap:8px;align-items:end;margin-bottom:8px}
  .dim-col-label{font-size:11px;color:var(--text3)}
  .btn-remove{width:36px;height:36px;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.15s}
  .btn-remove:hover{color:var(--red-text);border-color:rgba(224,85,85,0.3)}
  .btn-add-dim{padding:6px 12px;font-size:12px;border:0.5px dashed var(--border2);border-radius:var(--radius);background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;transition:all 0.15s}
  .btn-add-dim:hover{color:var(--text2);border-color:rgba(255,255,255,0.2)}
  .dim-note{font-size:11px;color:var(--text3);margin-top:6px}
  .info-box{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;font-size:12px;color:var(--text3);line-height:1.7}
  .info-box strong{color:var(--text2);display:block;margin-bottom:3px}
  .step-bar{display:flex;align-items:center;gap:0;margin-bottom:20px}
  .step-item{display:flex;flex-direction:column;align-items:center;gap:4px}
  .step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text3)}
  .step-dot.active{background:rgba(212,168,67,0.15);border-color:rgba(212,168,67,0.4);color:var(--accent)}
  .step-dot.done{background:var(--green-bg);border-color:rgba(77,184,122,0.3);color:var(--green-text)}
  .step-label{font-size:11px;color:var(--text3);white-space:nowrap}
  .step-label.active{color:var(--text2)}
  .step-line{flex:1;height:0.5px;background:var(--border);align-self:center;margin-bottom:16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(212,168,67,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
  .billing-edit-row{display:grid;grid-template-columns:1fr 130px 36px;gap:8px;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border)}
  .billing-input-label{background:transparent;border:0.5px solid transparent;border-radius:var(--radius);padding:5px 6px;color:var(--text2);font-size:13px;font-family:inherit;outline:none;width:100%;transition:all 0.15s}
  .billing-input-label:hover{border-color:var(--border2)}
  .billing-input-label:focus{border-color:var(--accent);background:var(--bg3);color:var(--text)}
  .billing-input-amount{background:transparent;border:0.5px solid transparent;border-radius:var(--radius);padding:5px 8px;color:var(--text);font-size:13px;font-weight:600;font-family:inherit;outline:none;text-align:right;width:100%;transition:all 0.15s}
  .billing-input-amount:hover{border-color:var(--border2)}
  .billing-input-amount:focus{border-color:var(--accent);background:var(--bg3)}
  .billing-free-badge{font-size:11px;background:var(--green-bg);color:var(--green-text);padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap;text-align:center}
  .billing-tbd-row{display:grid;grid-template-columns:1fr 130px 36px;gap:8px;align-items:center;padding:4px 0}
  .billing-tbd-label{font-size:12px;color:var(--text3)}
  .billing-tbd-val{font-size:12px;color:var(--text3);text-align:right;font-style:italic}
  .billing-total-row{display:flex;justify-content:space-between;padding:12px 0 0;margin-top:8px;border-top:1px solid rgba(255,255,255,0.15)}
  .billing-total-label{font-size:13px;font-weight:600;color:var(--text)}
  .billing-total-amount{font-size:18px;font-weight:700;color:var(--accent)}
  .add-line-row{display:grid;grid-template-columns:1fr 130px 80px;gap:8px;margin-top:10px;align-items:center}
  .add-line-row input{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:6px 8px;color:var(--text);font-size:12px;font-family:inherit;outline:none}
  .add-line-row input:focus{border-color:var(--accent)}
  .add-line-row input::placeholder{color:var(--text3)}
  .section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
  .edit-hint{font-size:11px;color:var(--text3);font-style:italic;font-weight:400;text-transform:none;letter-spacing:0}
  @media(max-width:600px){.grid-2,.grid-3{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr}.btn-row-split{flex-direction:column;align-items:stretch}.billing-edit-row,.billing-tbd-row,.add-line-row{grid-template-columns:1fr 100px 36px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </div>
    <div>
      <div class="header-title">ATA Carnet Billing Schedule</div>
      <div class="header-sub">Film Logic — International Freight Services</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('email')">Email agent</button>
    <button class="tab" onclick="switchTab('manual')">Manual entry</button>
  </div>
  <div id="tab-email"></div>
  <div id="tab-manual" style="display:none"></div>
</div>

<script>
const API_BASE="https://filmlogic-ata-backend-production.up.railway.app";
const DIM_DIV=6000;

const ORIGINS=[{label:"Europe (UK/Spain/France/Germany/Italy)",k:"europe"},{label:"Canada (YVR/YYZ/YYC)",k:"canada"},{label:"Mexico (MEX/NLU)",k:"mexico"},{label:"Asia (Japan/Thailand/China/Korea)",k:"asia"},{label:"Australia/New Zealand",k:"aus_nz"},{label:"Middle East (UAE/Dubai)",k:"me"},{label:"Latin America",k:"latam"}];
const AIRPORTS=[{label:"LAX – Los Angeles",k:"lax"},{label:"JFK – New York",k:"jfk"},{label:"EWR – Newark",k:"ewr"},{label:"SFO – San Francisco",k:"sfo"},{label:"ORD – Chicago",k:"ord"},{label:"ATL – Atlanta",k:"atl"},{label:"BOS – Boston",k:"bos"},{label:"MIA – Miami",k:"mia"},{label:"LAS – Las Vegas",k:"las"},{label:"IAD – Washington D.C.",k:"iad"}];
const OUTPORTS=["jfk","ewr","sfo","ord","atl","bos","mia","las","iad"]; // not lax

function fmt(n){return Number(n||0).toLocaleString("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtKg(n){return Math.round(n*10)/10}
function parseDollars(s){return parseFloat(String(s).replace(/[$,]/g,""))||0}
function calcDimWt(pieces){return pieces.reduce((s,p)=>{const l=parseFloat(p.l)||0,w=parseFloat(p.w)||0,h=parseFloat(p.h)||0,q=parseInt(p.qty)||1;return s+(l*w*h/DIM_DIV)*q;},0)}
function getWt(actualKg,dimPieces){const a=parseFloat(actualKg)||0,d=Math.round(calcDimWt(dimPieces||[])*10)/10;return{actual:a,dimWt:d,chargeable:Math.max(a,d),useDim:d>a}}
function originName(k){return(ORIGINS.find(r=>r.k===k)?.label||k).split(" (")[0]}
function airportName(k){return(AIRPORTS.find(a=>a.k===k)?.label||k).split("–")[0].trim()}
function isOutport(ap){return OUTPORTS.includes(ap)}

// ── CORRECTED fee engine (from official Film Logic fee schedule) ──────
function getDelivery(ap,mi){
  // Base rates by airport
  const b={lax:125,jfk:250,ewr:175,sfo:195,ord:125,atl:115,bos:350,mia:195,las:295,iad:250}[ap]||150;
  return mi>50?Math.round(b+(mi-30)*1.8):b;
}
function getForeign(o,pcs,kg){
  const b={europe:450,canada:295,mexico:925,asia:795,aus_nz:1200,me:1350,latam:1100}[o]||500;
  return(pcs>10||kg>500)?Math.round(b*1.15):b;
}
function getCouncilFee(v){
  if(v<10000)return 305;
  if(v<50000)return 350;
  if(v<150000)return 415;
  if(v<400000)return 475;
  if(v<1000000)return 530;
  return 595;
}
function getBond(v,vehicleType){
  // General commodities: 40% of value × 1.5% / min $125
  // Vehicle corp: 100% × 1.5% / min $125
  // Vehicle individual: 150% × 1.5% / min $125
  const multiplier=vehicleType==="corp"?1.0:vehicleType==="individual"?1.5:0.40;
  return Math.max(Math.round(v*multiplier*0.015*100)/100,125);
}
function getIssuanceFee(v){
  if(v<10000)return 150;
  if(v<50000)return 200;
  if(v<150000)return 250;
  if(v<400000)return 300;
  if(v<1000000)return 350;
  return 400;
}
function getMessengerFee(ap){
  // $125 at outports, $95 at LAX/LGB
  return isOutport(ap)?125:95;
}

function buildQuote(f){
  const val=parseFloat(f.value)||0,pcs=parseInt(f.pieces)||1;
  const wi=getWt(f.weightKg,f.dimPieces||[]);
  const mi=parseFloat(f.deliveryMiles)||20;
  const outport=isOutport(f.destAirport);
  const lines=[],tbd=[];

  lines.push({label:"Duties & Taxes (ATA Carnet)",amount:0,note:"Free"});
  lines.push({label:"ACE User Fees",amount:24.5});
  lines.push({label:"Brokerage Fees – ATA Carnet",amount:195}); // flat $195 per carnet
  lines.push({label:"CTPAT Fees (Customs Trade Partnership Against Terrorism)",amount:25});
  lines.push({label:"TSA Cyber Security Fee",amount:12.5});

  if(outport){
    lines.push({label:"Outport – Any port other than LAX/LGB",amount:150});
  }

  const messengerFee=getMessengerFee(f.destAirport);
  lines.push({label:"Messenger Fees"+(f.hasSpecialMessenger?" (incl. Special Messenger)":""),amount:f.hasSpecialMessenger?messengerFee+150:messengerFee});

  lines.push({label:"Import Service Fees at Cost",amount:0,note:"TBD"});
  lines.push({label:"Disbursement Fees – 5% of Outlay / Minimum $25.00",amount:25});

  if(f.hasAirlineRecovery)lines.push({label:"ATA Carnet Airline Recovery",amount:135});

  const fc=getForeign(f.origin,pcs,wi.chargeable);
  lines.push({label:"Foreign Charges in "+originName(f.origin),amount:fc});

  const del=getDelivery(f.destAirport,mi),fuel=Math.round(del*0.30);
  lines.push({label:airportName(f.destAirport)+" Airport Recovery & Delivery",amount:del});
  lines.push({label:"Fuel Surcharge",amount:fuel});

  if(f.hasLiftGate)lines.push({label:"Lift Gate",amount:65});
  if(f.hasOvertime)lines.push({label:"Overtime Services",amount:200});
  else tbd.push("Overtime Services – $200.00 (If Applicable)");
  tbd.push("Waiting Time – $65.00/hr after first 30 min free (If Applicable)");
  tbd.push("3% Credit Card Fee (If Applicable)");

  if(f.includeCarnetIssuance){
    lines.push({label:"US Council Carnet Charges",amount:getCouncilFee(val)});
    lines.push({label:"Carnet Bond Fee",amount:getBond(val,f.vehicleType||"")});
    lines.push({label:"Carnet Issuance",amount:getIssuanceFee(val)});
    lines.push({label:"ATA Carnet Closing Fees",amount:75});
    lines.push({label:"Lost Document Fee",amount:45});
    if(f.hasExpediteCarnet)lines.push({label:"Expedite Fees",amount:250});
    tbd.push("FedEx/Courier Fee for Carnet Delivery (At Cost)");
  }

  // Filter out TBD-note items from subtotal
  const subtotal=lines.reduce((s,l)=>s+(l.note==="TBD"||l.note==="Free"?0:parseDollars(l.amount)),0);
  return{lines,tbd,subtotal,wi};
}

// ── Editable billing state ─────────────────────────────────────────────
let editableLines=[],editableTbd=[],newLineLabel="",newLineAmount="";

function initEditableLines(result){
  editableLines=result.lines.map(l=>({...l}));
  editableTbd=[...result.tbd];
  newLineLabel="";newLineAmount="";
}
function editableTotal(){
  return editableLines.reduce((s,l)=>s+(l.note==="Free"||l.note==="TBD"?0:parseDollars(l.amount)),0);
}
function updateLineLabel(i,v){editableLines[i].label=v;refreshTotal()}
function updateLineAmount(i,v){editableLines[i].amount=parseDollars(v);editableLines[i].note=undefined;refreshTotal()}
function removeLine(i){editableLines.splice(i,1);refreshTotal();rerenderBillingTable()}
function removeTbd(i){editableTbd.splice(i,1);rerenderBillingTable()}
function addCustomLine(){
  if(!newLineLabel.trim())return;
  editableLines.push({label:newLineLabel,amount:parseDollars(newLineAmount)||0});
  newLineLabel="";newLineAmount="";
  rerenderBillingTable();refreshTotal();
}
function refreshTotal(){
  const el=document.getElementById("billing-total-amount");
  if(el)el.textContent=fmt(editableTotal());
  const el2=document.getElementById("metric-total");
  if(el2)el2.textContent=fmt(editableTotal());
}
function rerenderBillingTable(){
  const wrap=document.getElementById("billing-table-wrap");
  if(wrap)wrap.innerHTML=billingTableHTML();
}
function billingTableHTML(){
  const rows=editableLines.map((l,i)=>`
    <div class="billing-edit-row">
      <input class="billing-input-label" value="${(l.label||"").replace(/"/g,"&quot;")}" oninput="updateLineLabel(${i},this.value)" placeholder="Line item">
      ${l.note==="Free"?`<div class="billing-free-badge">Free</div>`:
        l.note==="TBD"?`<div style="font-size:12px;color:var(--text3);text-align:right;font-style:italic">TBD</div>`:
        `<input class="billing-input-amount" value="${fmt(l.amount||0)}" onfocus="this.value='${l.amount||0}'" onblur="this.value=fmt(parseFloat(this.value)||0);updateLineAmount(${i},this.value)" oninput="updateLineAmount(${i},this.value)">`}
      <button class="btn-remove" onclick="removeLine(${i})" title="Remove">×</button>
    </div>`).join("");
  const tbdRows=editableTbd.map((t,i)=>`
    <div class="billing-tbd-row">
      <span class="billing-tbd-label">${t}</span>
      <span class="billing-tbd-val">TBD</span>
      <button class="btn-remove" onclick="removeTbd(${i})">×</button>
    </div>`).join("");
  return `${rows}
    ${tbdRows?`<div style="margin-top:6px">${tbdRows}</div>`:""}
    <div style="border-top:0.5px solid var(--border);margin-top:10px;padding-top:10px">
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">+ Add custom line item</div>
      <div class="add-line-row">
        <input id="new-line-label" placeholder="Description" value="${newLineLabel}" oninput="newLineLabel=this.value">
        <input id="new-line-amount" placeholder="Amount" type="number" value="${newLineAmount||""}" oninput="newLineAmount=this.value">

function copyQuote(form){
  if(!form)return;
  const wi=getWt(form.weightKg,form.dimPieces||[]);
  const dir=form.direction?.includes("import")?"IMPORT":form.direction==="export"?"EXPORT":"RETURN";
  const outport=isOutport(form.destAirport);
  let t=`* * * ATA CARNET ${dir}${outport?" (OUTPORT)":""} CLEARANCE & DELIVERY * * *\n`;
  if(form.carnetNumber)t+=`ATA CARNET # ${form.carnetNumber}\n`;
  if(form.client)t+=`Client: ${form.client}\n`;
  if(form.production)t+=`Production: ${form.production}\n`;
  if(form.pieces)t+=`${form.pieces} PCS / ${fmtKg(wi.chargeable||0)} KGS CHARGEABLE WT (Actual: ${fmtKg(wi.actual||0)} / Dim: ${fmtKg(wi.dimWt||0)}) / VALUE $${(parseFloat(form.value)||0).toLocaleString()} USD\n`;
  if(form.commodity)t+=`Commodity: ${form.commodity}\n`;
  t+=`Origin: ${originName(form.origin)} → ${airportName(form.destAirport)}\n\n`;
  editableLines.forEach(l=>{t+=`${l.label}\t${l.note==="Free"?"Free":l.note==="TBD"?"TBD":fmt(l.amount)}\n`;});
  editableTbd.forEach(tb=>{t+=`${tb}\tTBD\n`;});
  t+=`\nESTIMATED TOTAL (Not Including TBD Charges)\t${fmt(editableTotal())}\n`;
  if(form.notes)t+=`\nNotes: ${form.notes}\n`;
  t+=`\nValidity of this estimate is 7 days and is subject to change.`;
  navigator.clipboard.writeText(t).then(()=>{
    const btn=document.getElementById("copy-btn");
    if(btn){btn.textContent="Copied!";setTimeout(()=>{btn.textContent="Copy quote"},2000);}
  });
}

function switchTab(tab){

}

function dimSectionHTML(dimPieces,prefix){

    </div>`).join("");
  const wi=getWt(0,dimPieces);
  return `<div><label style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:8px">Cargo dimensions (cm)</label>

    <p class="dim-note">Divisor: 6,000 cm³/kg (IATA air freight standard)</p>
  </div>`;
}
function initDimState(prefix,pieces){dimStates[prefix]=[...pieces.map(p=>({...p}))]}
function addDim(prefix){if(!dimStates[prefix])dimStates[prefix]=[];dimStates[prefix].push({l:"",w:"",h:"",qty:"1"});syncDimState(prefix);rerenderDimRows(prefix)}
function removeDim(prefix,i){if(!dimStates[prefix])return;dimStates[prefix].splice(i,1);syncDimState(prefix);rerenderDimRows(prefix)}
function updateDim(prefix,i,k,v){if(!dimStates[prefix]||!dimStates[prefix][i])return;dimStates[prefix][i][k]=v;syncDimState(prefix)}
function syncDimState(prefix){
  if(prefix==="manual")manualForm.dimPieces=[...dimStates[prefix]];
  else if(prefix==="email-edit"&&emailState.extracted)emailState.extracted.dimPieces=[...dimStates[prefix]];
}
function rerenderDimRows(prefix){
  const wrap=document.getElementById(prefix+"-dim-rows");
  if(!wrap)return;
  wrap.innerHTML=(dimStates[prefix]||[]).map((p,i)=>`
    <div class="dim-row-grid">
      <div class="field" style="margin:0"><input type="number" min="0" placeholder="e.g. 60" value="${p.l||""}" oninput="updateDim('${prefix}',${i},'l',this.value)"></div>
      <div class="field" style="margin:0"><input type="number" min="0" placeholder="e.g. 40" value="${p.w||""}" oninput="updateDim('${prefix}',${i},'w',this.value)"></div>
      <div class="field" style="margin:0"><input type="number" min="0" placeholder="e.g. 35" value="${p.h||""}" oninput="updateDim('${prefix}',${i},'h',this.value)"></div>
      <div class="field" style="margin:0"><input type="number" min="1" placeholder="1" value="${p.qty||1}" oninput="updateDim('${prefix}',${i},'qty',this.value)"></div>
      <button class="btn-remove" onclick="removeDim('${prefix}',${i})">×</button>
    </div>`).join("");
}

}

async function parseEmail(){
  const email=document.getElementById("email-input")?.value||emailState.email;
  if(!email.trim())return;
  emailState.email=email;emailState.status="loading";emailState.error="";renderEmail();
  try{
    const res=await fetch(API_BASE+"/api/parse-email",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({emailBody:email})});
    const data=await res.json();
    if(!res.ok||!data.success)throw new Error(data.error||"Server error");
    const parsed=data.data;
    if(!parsed.dimPieces)parsed.dimPieces=[];
    emailState.extracted=parsed;
    const result=buildQuote(parsed);
    emailState.result=result;
    initEditableLines(result);
    emailState.status="done";
  }catch(err){
    emailState.error="Could not parse the email: "+err.message;
    emailState.status="idle";
  }
  renderEmail();
}

// ── Manual tab ─────────────────────────────────────────────────────────
let manualStep=1;
let manualForm={client:"",production:"",carnetNumber:"",origin:"europe",destAirport:"lax",pieces:"",weightKg:"",value:"",commodity:"",deliveryMiles:20,hasLiftGate:false,hasOvertime:false,hasSpecialMessenger:false,hasAirlineRecovery:false,includeCarnetIssuance:false,hasExpediteCarnet:false,vehicleType:"",direction:"import",notes:"",dimPieces:[{l:"",w:"",h:"",qty:"1"}]};
let manualResult=null;

function renderManual(){
  const c=document.getElementById("tab-manual");
  if(!c)return;
  const f=manualForm;
  if(manualResult){currentForm=manualForm;c.innerHTML=quoteHTML(manualResult,manualForm,"resetManual()","editManual()");return;}
  const stepBar=`<div class="step-bar">
    <div class="step-item"><div class="step-dot ${manualStep===1?"active":manualStep>1?"done":""}">1</div><span class="step-label ${manualStep===1?"active":""}">Job details</span></div>
    <div class="step-line"></div>
    <div class="step-item"><div class="step-dot ${manualStep===2?"active":manualStep>2?"done":""}">2</div><span class="step-label ${manualStep===2?"active":""}">Shipment</span></div>
    <div class="step-line"></div>
    <div class="step-item"><div class="step-dot">3</div><span class="step-label">Quote</span></div>
  </div>`;
  if(manualStep===1){
    c.innerHTML=stepBar+`<div class="card">
      <div class="grid-2">
        <div class="field"><label>Client</label><input placeholder="e.g. Paramount Pictures" value="${f.client}" oninput="manualForm.client=this.value"></div>
        <div class="field"><label>Production title</label><input placeholder="e.g. Mission Impossible 8" value="${f.production}" oninput="manualForm.production=this.value"></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>ATA Carnet #</label><input placeholder="e.g. US42-2480084" value="${f.carnetNumber}" oninput="manualForm.carnetNumber=this.value"></div>
        <div class="field"><label>Direction</label><select onchange="manualForm.direction=this.value">
          <option value="import" ${f.direction==="import"?"selected":""}>Import (inbound)</option>
          <option value="return" ${f.direction==="return"?"selected":""}>Return (outbound)</option>
          <option value="export" ${f.direction==="export"?"selected":""}>Export (one-way out)</option>
        </select></div>
      </div>
      <div class="field"><label>Commodity</label><input placeholder="e.g. Camera lenses, film props, wardrobe" value="${f.commodity}" oninput="manualForm.commodity=this.value"></div>
      <div class="grid-2">
        <div class="field"><label>No. of pieces</label><input type="number" min="1" placeholder="e.g. 6" value="${f.pieces}" oninput="manualForm.pieces=this.value"></div>
        <div class="field"><label>Declared value (USD)</label><input type="number" min="0" placeholder="e.g. 399000" value="${f.value}" oninput="manualForm.value=this.value"></div>
      </div>
      <div class="divider"></div>
      <div class="field"><label>Actual gross weight (KGS)</label><input type="number" min="0" placeholder="e.g. 89" value="${f.weightKg}" oninput="manualForm.weightKg=this.value"></div>
      ${dimSectionHTML(f.dimPieces,"manual")}
      <div class="divider"></div>
      <label class="checkbox-row"><input type="checkbox" ${f.includeCarnetIssuance?"checked":""} onchange="manualForm.includeCarnetIssuance=this.checked;renderManual()"> Add US Council issuance, bond & closing fees</label>
      ${f.includeCarnetIssuance?`
        <label class="checkbox-row" style="padding-left:20px"><input type="checkbox" ${f.hasExpediteCarnet?"checked":""} onchange="manualForm.hasExpediteCarnet=this.checked"> Rush / expedite (+$250)</label>
        <div class="field" style="margin-top:8px"><label>Cargo type (affects bond calculation)</label><select onchange="manualForm.vehicleType=this.value">
          <option value="" ${!f.vehicleType?"selected":""}>General commodity (40% × 1.5%)</option>
          <option value="corp" ${f.vehicleType==="corp"?"selected":""}>Vehicle – Corporation (100% × 1.5%)</option>
          <option value="individual" ${f.vehicleType==="individual"?"selected":""}>Vehicle – Individual (150% × 1.5%)</option>
        </select></div>`:""}
      <div class="field" style="margin-top:10px"><label>Notes</label><textarea placeholder="Special instructions, pickup address, delivery address…" style="min-height:48px;resize:vertical" oninput="manualForm.notes=this.value">${f.notes}</textarea></div>
      <div class="btn-row"><button class="btn btn-primary" onclick="manualStep=2;renderManual()">Next: shipment →</button></div>
    </div>`;
    initDimState("manual",f.dimPieces);
  } else {
    c.innerHTML=stepBar+`<div class="card">
      <div class="field"><label>Origin region</label><select onchange="manualForm.origin=this.value">${ORIGINS.map(r=>`<option value="${r.k}" ${f.origin===r.k?"selected":""}>${r.label}</option>`).join("")}</select></div>
      <div class="grid-2">
        <div class="field"><label>US destination airport</label><select onchange="manualForm.destAirport=this.value;renderManual()">${AIRPORTS.map(a=>`<option value="${a.k}" ${f.destAirport===a.k?"selected":""}>${a.label}${OUTPORTS.includes(a.k)?" (outport)":""}</option>`).join("")}</select></div>
        <div class="field"><label>Delivery distance (miles)</label><input type="number" min="0" value="${f.deliveryMiles}" oninput="manualForm.deliveryMiles=this.value"></div>
      </div>
      ${isOutport(f.destAirport)?`<div class="alert alert-info" style="margin-bottom:12px;font-size:12px">Outport detected — a $150.00 outport fee and $125.00 messenger fee will be applied.</div>`:""}
      <div class="divider"></div>
      <div style="margin-bottom:6px"><label style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em">Additional services</label></div>
      <div class="checkbox-grid">
        <label class="checkbox-row"><input type="checkbox" ${f.hasLiftGate?"checked":""} onchange="manualForm.hasLiftGate=this.checked"> Lift gate (+$65)</label>
        <label class="checkbox-row"><input type="checkbox" ${f.hasOvertime?"checked":""} onchange="manualForm.hasOvertime=this.checked"> Overtime (+$200)</label>
        <label class="checkbox-row"><input type="checkbox" ${f.hasSpecialMessenger?"checked":""} onchange="manualForm.hasSpecialMessenger=this.checked"> Special messenger (+$150)</label>
        <label class="checkbox-row"><input type="checkbox" ${f.hasAirlineRecovery?"checked":""} onchange="manualForm.hasAirlineRecovery=this.checked"> Airline recovery (+$135)</label>
      </div>
      <div class="btn-row-split">
        <button class="btn" onclick="manualStep=1;renderManual()">← Back</button>
        <button class="btn btn-primary" onclick="generateManualQuote()">Generate quote →</button>
      </div>
    </div>`;
  }
}

function generateManualQuote(){
  const result=buildQuote(manualForm);
  initEditableLines(result);
  manualResult=result;
  renderManual();
}
function resetManual(){manualStep=1;manualResult=null;manualForm={client:"",production:"",carnetNumber:"",origin:"europe",destAirport:"lax",pieces:"",weightKg:"",value:"",commodity:"",deliveryMiles:20,hasLiftGate:false,hasOvertime:false,hasSpecialMessenger:false,hasAirlineRecovery:false,includeCarnetIssuance:false,hasExpediteCarnet:false,vehicleType:"",direction:"import",notes:"",dimPieces:[{l:"",w:"",h:"",qty:"1"}]};renderManual();}
function editManual(){manualResult=null;manualStep=1;renderManual();}

checkServer();
renderEmail();
renderManual();
</script>
